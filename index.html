<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07050D">
  <title>MAFIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap"></noscript>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07050D;
      --surface-1: #0C0A18;
      --surface-2: #111028;
      --border: rgba(255,255,255,.07);
      --border-active: rgba(255,255,255,.14);
      --red: #B81228;
      --red-hot: #D81436;
      --gold: #B8920C;
      --gold-hot: #D4AA14;
      --green: #1A6040;
      --green-hot: #22B060;
      --blue: #6888D0;
      --text: #E2D6C0;
      --text-2: #887868;
      --text-3: #4A4038;
      --paper: #F0E7D4;
      --ink: #1B1820;
      --spring: cubic-bezier(.34, 1.56, .64, 1);
      --steady: cubic-bezier(.22, .61, .36, 1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; overscroll-behavior: none; background: var(--bg); }
    body {
      color: var(--text);
      font-family: Outfit, ui-sans-serif, system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button, input { font: inherit; }
    button { border: 0; color: inherit; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .42; }

    .ambient {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(104,136,208,.12), transparent 36%),
        linear-gradient(180deg, #090710 0%, #07050D 42%, #05040A 100%);
      pointer-events: none;
      contain: strict;
    }
    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(80px);
      opacity: .72;
      transform: translateZ(0);
      animation: blobDrift 10s var(--steady) infinite alternate;
    }
    .ambient::before {
      left: -160px;
      top: -130px;
      background: radial-gradient(circle, rgba(216,20,54,.75), rgba(184,18,40,.18) 48%, transparent 72%);
    }
    .ambient::after {
      right: -170px;
      bottom: -130px;
      background: radial-gradient(circle, rgba(82,57,151,.72), rgba(17,16,40,.26) 52%, transparent 74%);
      animation-duration: 12s;
      animation-direction: alternate-reverse;
    }
    @keyframes blobDrift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(34px, 24px, 0) scale(1.12); }
    }

    #stars {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity .7s var(--steady);
      pointer-events: none;
      contain: strict;
    }
    body.night #stars { opacity: 1; }
    .star {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      opacity: .26;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      transform: translateZ(0);
    }
    @keyframes twinkle {
      from { opacity: .12; transform: scale(.72) translateZ(0); }
      to { opacity: .86; transform: scale(1.2) translateZ(0); }
    }

    #app {
      position: relative;
      z-index: 2;
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 96px);
      transition: opacity .22s var(--steady), transform .22s var(--steady);
      contain: layout style;
    }
    #app.is-moving { opacity: 0; transform: translate3d(0, 18px, 0); }

    .screen {
      width: min(100%, 560px);
      min-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 28px);
      margin: 0 auto;
      animation: screenIn .42s var(--spring) both;
      contain: layout style;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translate3d(0, 22px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }

    .glass {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, .045);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      border: 1px solid rgba(255, 255, 255, .10);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .14),
        inset 0 -1px 0 rgba(0, 0, 0, .18),
        0 20px 60px rgba(0, 0, 0, .5);
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.105) 0%, rgba(255,255,255,.03) 42%, transparent 72%);
      pointer-events: none;
    }
    .glass-lite {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, .038);
      -webkit-backdrop-filter: blur(22px) saturate(170%) brightness(1.04);
      backdrop-filter: blur(22px) saturate(170%) brightness(1.04);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 14px 36px rgba(0,0,0,.32);
    }

    .logo-wrap { padding: 26px 6px 22px; text-align: center; }
    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 4.15rem;
      line-height: .82;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
      text-shadow: 0 1px 0 rgba(255,255,255,.08), 0 22px 70px rgba(216,20,54,.22);
    }
    .suits { margin-top: 12px; color: var(--gold-hot); font-family: "Cormorant Garamond", Georgia, serif; font-size: 1.15rem; }
    .kicker {
      margin-top: 12px;
      color: var(--text-2);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    .panel { border-radius: 24px; padding: 16px; margin-bottom: 14px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 10px;
      color: var(--text-2);
      font-size: .74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .13em;
    }
    .section-label svg { width: 15px; height: 15px; }
    .muted { color: var(--text-2); }
    .tiny { color: var(--text-3); font-size: .75rem; }

    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .name-input {
      min-width: 0;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.09);
      outline: none;
      background: rgba(0,0,0,.28);
      color: var(--text);
      padding: 0 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .name-input:focus { border-color: rgba(212,170,20,.36); box-shadow: 0 0 0 3px rgba(212,170,20,.10), inset 0 1px 0 rgba(255,255,255,.05); }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 14px;
      padding: 0 16px;
      font-weight: 700;
      font-size: .86rem;
      letter-spacing: 0;
      transition: transform .18s var(--spring), opacity .18s var(--steady), border-color .18s var(--steady), background .18s var(--steady);
      transform: translateZ(0);
      user-select: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.975) translateZ(0); }
    .btn svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .btn-primary {
      color: #fff8e8;
      background: linear-gradient(180deg, #D81436, #961225);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 18px 34px rgba(184,18,40,.32);
    }
    .btn-gold {
      color: #19100A;
      background: linear-gradient(180deg, #F1C640, #B8920C);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.38), 0 18px 34px rgba(184,146,12,.25);
    }
    .btn-ghost {
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.09);
      color: var(--text);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      backdrop-filter: blur(22px) saturate(160%);
    }
    .btn-danger {
      color: white;
      background: linear-gradient(180deg, #D81436, #7E0E1D);
    }
    .btn-block { width: 100%; }
    .btn-icon { width: 46px; padding: 0; }

    .player-list { display: grid; gap: 9px; }
    .person-row {
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 18px;
      animation: rowIn .36s var(--spring) both;
      animation-delay: calc(var(--i, 0) * 36ms);
      contain: layout paint style;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translate3d(0, 12px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    .row-num {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      color: var(--gold-hot);
      font-weight: 700;
      font-size: .84rem;
    }
    .player-name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .skeleton { height: 58px; border-radius: 18px; background: linear-gradient(90deg, rgba(255,255,255,.035), rgba(255,255,255,.07), rgba(255,255,255,.035)); opacity: .55; }

    .config-list { display: grid; gap: 10px; }
    .config-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.06);
    }
    .config-name { font-weight: 700; }
    .config-meta { margin-top: 3px; color: var(--text-2); font-size: .76rem; }
    .stepper { display: grid; grid-template-columns: 38px 34px 38px; align-items: center; gap: 4px; }
    .stepper button {
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
    }
    .stepper svg { width: 17px; height: 17px; }
    .stepper-value { text-align: center; color: var(--text); font-weight: 800; }
    .toggle {
      width: 58px;
      height: 34px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.09);
      transition: background .2s var(--steady), border-color .2s var(--steady);
    }
    .toggle span {
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(226,214,192,.88);
      transition: transform .28s var(--spring), background .2s var(--steady);
      box-shadow: 0 4px 14px rgba(0,0,0,.32);
    }
    .toggle.on { background: rgba(184,146,12,.32); border-color: rgba(212,170,20,.44); }
    .toggle.on span { transform: translate3d(24px,0,0); background: #F3D46E; }

    .validation {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 50px;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: .84rem;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      margin-bottom: 14px;
    }
    .validation.ok { color: #A8E8BF; border-color: rgba(34,176,96,.22); }
    .validation.warn { color: #E5C15A; border-color: rgba(212,170,20,.22); }
    .validation.err { color: #FF8EA0; border-color: rgba(216,20,54,.28); }

    .header {
      position: sticky;
      top: calc(var(--safe-top) + 8px);
      z-index: 7;
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 14px;
      transform: translateZ(0);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2rem;
      line-height: 1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .subtitle { margin-top: 5px; color: var(--text-2); font-size: .82rem; }
    .phase-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.045);
      color: var(--text);
      font-weight: 800;
      font-size: .73rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .phase-pill svg { width: 15px; height: 15px; }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      padding: 12px 14px calc(var(--safe-bottom) + 12px);
      background: linear-gradient(180deg, transparent, rgba(7,5,13,.88) 30%, rgba(7,5,13,.98));
      pointer-events: none;
    }
    .bottom-inner {
      width: min(100%, 560px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: auto;
    }
    .bottom-inner.single { grid-template-columns: 1fr; }

    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--safe-bottom) + 86px);
      z-index: 9;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: var(--text);
      transform: translateZ(0);
    }
    .fab svg { width: 23px; height: 23px; }
    body.night .fab { animation: pulseRed 1.5s ease-in-out infinite; }
    @keyframes pulseRed {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 rgba(216,20,54,0), 0 18px 44px rgba(0,0,0,.5); }
      50% { box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 34px rgba(216,20,54,.36), 0 18px 44px rgba(0,0,0,.5); }
    }

    .reveal-screen {
      min-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 60px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      gap: 14px;
      text-align: center;
      position: relative;
    }
    .reveal-name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2.35rem;
      font-weight: 700;
      line-height: 1;
      overflow-wrap: anywhere;
    }
    .reveal-count { color: var(--text-2); font-size: .8rem; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; }
    .reveal-hint { color: var(--text-2); font-size: .9rem; line-height: 1.4; }
    .card-scene {
      width: min(70vw, 286px);
      max-width: 100%;
      aspect-ratio: 5 / 7;
      margin: 0 auto;
      perspective: 1300px;
      contain: layout paint style;
    }
    .playing-card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      transform-style: preserve-3d;
      transition: transform .72s var(--spring);
      will-change: transform;
      transform: translateZ(0);
    }
    .playing-card.flipped { transform: rotateY(180deg) translateZ(0); }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0,0,0,.58), inset 0 1px 0 rgba(255,255,255,.42);
    }
    .card-back {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.16), transparent 22%),
        repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 2px, transparent 2px 9px),
        linear-gradient(145deg, #220711, #900F24 48%, #190813);
      border: 9px solid #E8D9B7;
    }
    .card-back::before {
      content: "";
      position: absolute;
      inset: 13px;
      border: 1px solid rgba(232,217,183,.72);
      border-radius: 10px;
    }
    .card-back-mark {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: rgba(255,248,226,.88);
      text-shadow: 0 8px 26px rgba(0,0,0,.45);
    }
    .card-front {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 50% 48%, rgba(184,146,12,.12), transparent 30%),
        linear-gradient(155deg, #FFF8EA, var(--paper));
      color: var(--ink);
      border: 1px solid rgba(55,37,23,.2);
    }
    .card-front.mafia { background: linear-gradient(155deg, #2A1014, #0E0B12); color: #F0E7D4; border-color: rgba(216,20,54,.34); }
    .card-front.neutral { background: linear-gradient(155deg, #FFF8EA, #EAD7B7); color: #22170B; }
    .card-corner {
      position: absolute;
      left: 14px;
      top: 12px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700;
      font-size: 1.24rem;
      line-height: .88;
      text-align: center;
    }
    .card-corner.br { left: auto; top: auto; right: 14px; bottom: 12px; transform: rotate(180deg); }
    .card-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 36px;
    }
    .card-value { font-family: "Cormorant Garamond", Georgia, serif; font-size: 5.1rem; font-weight: 700; line-height: .72; }
    .card-suit { margin-top: 10px; font-family: "Cormorant Garamond", Georgia, serif; font-size: 2.2rem; line-height: 1; color: currentColor; }
    .card-role { margin-top: 16px; font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .16em; color: currentColor; opacity: .78; }
    .red-pip { color: #A81124; }
    .black-pip { color: currentColor; }
    .gold-pip { color: var(--gold-hot); }

    .role-pip {
      width: 40px;
      height: 50px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: linear-gradient(155deg, #FFF8EA, #EADBC3);
      color: #1D1820;
      box-shadow: 0 8px 20px rgba(0,0,0,.28);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700;
      line-height: .8;
      text-align: center;
      border: 1px solid rgba(0,0,0,.12);
    }
    .role-pip.mafia { background: linear-gradient(155deg, #291016, #0D0A12); color: #F0E7D4; border-color: rgba(216,20,54,.32); }
    .pip-suit { display: block; margin-top: 4px; font-size: 1.05rem; }

    .game-row {
      min-height: 70px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      transition: transform .18s var(--spring), border-color .18s var(--steady), background .18s var(--steady);
      animation: rowIn .36s var(--spring) both;
      animation-delay: calc(var(--i, 0) * 36ms);
      contain: layout paint style;
    }
    .game-row:active { transform: scale(.985) translateZ(0); }
    .game-row.dead { opacity: .48; filter: grayscale(.5); }
    .game-row.selected { border-color: rgba(212,170,20,.5); background: rgba(212,170,20,.10); }
    .row-sub { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; color: var(--text-2); font-size: .78rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .badge svg { width: 12px; height: 12px; }
    .badge.red { color: #FFB2BF; border-color: rgba(216,20,54,.28); }
    .badge.gold { color: #F2D779; border-color: rgba(212,170,20,.28); }
    .badge.green { color: #A6E8BD; border-color: rgba(34,176,96,.25); }
    .row-check { color: var(--gold-hot); }
    .row-check svg { width: 24px; height: 24px; }

    .boneyard { margin-top: 18px; }
    .progress-dots { display: flex; gap: 7px; margin-top: 12px; }
    .dot {
      height: 6px;
      flex: 1;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .dot.done, .dot.active { background: rgba(212,170,20,.38); }
    .dot.active { box-shadow: 0 0 18px rgba(212,170,20,.38); }

    .step-card {
      position: relative;
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 14px;
      isolation: isolate;
    }
    .step-card::after {
      content: "";
      position: absolute;
      inset: -30px -20px auto;
      height: 180px;

    .action-tile {
      min-height: 88px;
      border-radius: 20px;

      text-align: left;

    .action-tile.selected { border-color: rgba(212,170,20,.46); background: rgba(212,170,20,.11); }
    .action-tile svg { width: 22px; height: 22px; color: var(--gold-hot); }
    .action-title { margin-top: 8px; font-weight: 800; }
    .action-sub { margin-top: 3px; color: var(--text-2); font-size: .76rem; line-height: 1.25; }
    .hint {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      color: #F3D67E;
      background: rgba(184,146,12,.10);
      border: 1px solid rgba(212,170,20,.22);
      font-size: .82rem;
      font-weight: 700;
    }
    .hint svg { width: 16px; height: 16px; }
    .result-card {
      margin-top: 12px;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,.10);

    .result-card.good { color: #B7F2CB; background: rgba(34,176,96,.11); }
    .result-card.bad { color: #FFB4C0; background: rgba(216,20,54,.12); }
    .result-card svg { width: 21px; height: 21px; }

      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 13px;

      height: 38px;

    .winner-mark {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;

      max-height: min(84dvh, 780px);

      margin: 0 auto;
      border-radius: 30px 30px 0 0;

      transform: translateZ(0);
      pointer-events: auto;

      to { transform: translate3d(0, 0, 0); }

      height: 5px;

      font-size: 2rem;
      font-weight: 700;
      line-height: 1;

    .sheet-body {
      max-height: calc(84dvh - 120px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding: 2px 2px 10px;
      overscroll-behavior: contain;
    }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
    .tab {

      border-radius: 14px;

    .count-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }

    .count-num { font-weight: 900; font-size: 1.2rem; }
    .count-label { margin-top: 3px; color: var(--text-2); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; }

    .undo {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(var(--safe-bottom) + 14px);
      width: min(calc(100% - 28px), 560px);
      margin: 0 auto;
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
      animation: rowIn .28s var(--spring) both;

    .undo-text { font-weight: 800; font-size: .85rem; }
    .undo-sub { margin-top: 3px; color: var(--text-2); font-size: .74rem; }
    .undo-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: var(--gold-hot);
      transform-origin: left;
      animation: undoDrain 5s linear forwards;
    }
    @keyframes undoDrain { to { transform: scaleX(0); } }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 720px) {

    @media (max-width: 380px) {
      .logo { font-size: 3.55rem; }

      .card-value { font-size: 4.4rem; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  <script>
    "use strict";

    const ROLE = {

    const TEAM_ORDER = [

    const STEP_META = {

    const ICON = {

      cards: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="7" y="3" width="11" height="16" rx="2" transform="rotate(8 12.5 11)"/><rect x="4" y="5" width="11" height="16" rx="2" transform="rotate(-7 9.5 13)"/></svg>',
      blade: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l6.5-6.5"/><path d="M13 14l7-7c.7-.7.3-2-1-2h-4l-5 5 4 4Z"/><path d="M7.5 16.5l-1-1"/></svg>',
      skull: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-4 0-7 2.8-7 6.8 0 2.8 1.2 4.4 3 5.5V20h8v-4.7c1.8-1.1 3-2.7 3-5.5C19 5.8 16 3 12 3Z"/><path d="M9 10h.01M15 10h.01M10 16v4M14 16v4M12 14v2"/></svg>',
      heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5.1 5.1 0 0 0-7.2 0L12 7.2l-1.6-1.6a5.1 5.1 0 1 0-7.2 7.2L12 21l8.8-8.2a5.1 5.1 0 0 0 0-7.2Z"/></svg>',
      shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="M9 12l2 2 4-5"/></svg>',
      search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>',

      bind: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7l10 10M17 7L7 17"/><circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/></svg>',
