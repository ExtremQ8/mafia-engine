<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A mobile-first Mafia moderator game for one phone, private role reveals, guided nights, voting, and local autosave.">
  <meta name="theme-color" content="#07050D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MAFIA">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>MAFIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap"></noscript>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07050D;
      --surface-1: #0C0A18;
      --surface-2: #111028;
      --border: rgba(255,255,255,.07);
      --border-active: rgba(255,255,255,.14);
      --red: #B81228;
      --red-hot: #D81436;
      --gold: #B8920C;
      --gold-hot: #D4AA14;
      --green: #1A6040;
      --green-hot: #22B060;
      --blue: #6888D0;
      --cyan: #71D3F5;
      --text: #E2D6C0;
      --text-2: #887868;
      --text-3: #4A4038;
      --paper: #F0E7D4;
      --ink: #1B1820;
      --spring: cubic-bezier(.34, 1.56, .64, 1);
      --steady: cubic-bezier(.22, .61, .36, 1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; overscroll-behavior: none; background: var(--bg); }
    body {
      color: var(--text);
      font-family: Outfit, ui-sans-serif, system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button, input { font: inherit; }
    button { border: 0; color: inherit; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .42; }
    button:focus-visible,
    input:focus-visible {
      outline: 2px solid rgba(212,170,20,.72);
      outline-offset: 3px;
    }

    .ambient {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(104,136,208,.12), transparent 36%),
        linear-gradient(180deg, #090710 0%, #07050D 42%, #05040A 100%);
      pointer-events: none;
      contain: strict;
    }
    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(80px);
      opacity: .72;
      transform: translateZ(0);
      animation: blobDrift 10s var(--steady) infinite alternate;
    }
    .ambient::before {
      left: -160px;
      top: -130px;
      background: radial-gradient(circle, rgba(216,20,54,.75), rgba(184,18,40,.18) 48%, transparent 72%);
    }
    .ambient::after {
      right: -170px;
      bottom: -130px;
      background: radial-gradient(circle, rgba(82,57,151,.72), rgba(17,16,40,.26) 52%, transparent 74%);
      animation-duration: 12s;
      animation-direction: alternate-reverse;
    }
    @keyframes blobDrift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(34px, 24px, 0) scale(1.12); }
    }

    #stars {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity .7s var(--steady);
      pointer-events: none;
      contain: strict;
    }
    body.night #stars { opacity: 1; }
    .star {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      opacity: .26;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      transform: translateZ(0);
    }
    @keyframes twinkle {
      from { opacity: .12; transform: scale(.72) translateZ(0); }
      to { opacity: .86; transform: scale(1.2) translateZ(0); }
    }

    #app {
      position: relative;
      z-index: 2;
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 96px);
      transition: opacity .22s var(--steady), transform .22s var(--steady);
      contain: layout style;
    }
    body.has-toast #app { padding-bottom: calc(var(--safe-bottom) + 172px); }
    #app.is-moving { opacity: 0; transform: translate3d(0, 18px, 0); }

    .screen {
      width: min(100%, 560px);
      min-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 28px);
      margin: 0 auto;
      animation: screenIn .42s var(--spring) both;
      contain: layout style;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translate3d(0, 22px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }

    .glass {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, .045);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      border: 1px solid rgba(255, 255, 255, .10);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .14),
        inset 0 -1px 0 rgba(0, 0, 0, .18),
        0 20px 60px rgba(0, 0, 0, .5);
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.105) 0%, rgba(255,255,255,.03) 42%, transparent 72%);
      pointer-events: none;
    }
    .glass-lite {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, .038);
      -webkit-backdrop-filter: blur(22px) saturate(170%) brightness(1.04);
      backdrop-filter: blur(22px) saturate(170%) brightness(1.04);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 14px 36px rgba(0,0,0,.32);
    }
    body.low-blur .glass,
    body.low-blur .glass-lite,
    body.low-blur .btn-ghost {
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      background: rgba(20, 15, 33, .86);
    }
    body.motion-subtle .ambient::before,
    body.motion-subtle .ambient::after,
    body.motion-subtle .star,
    body.motion-subtle .fab {
      animation-duration: 20s !important;
    }

    .logo-wrap { padding: 26px 6px 22px; text-align: center; }
    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 4.15rem;
      line-height: .82;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
      text-shadow: 0 1px 0 rgba(255,255,255,.08), 0 22px 70px rgba(216,20,54,.22);
    }
    .suits { margin-top: 12px; color: var(--gold-hot); font-family: "Cormorant Garamond", Georgia, serif; font-size: 1.15rem; }
    .kicker {
      margin-top: 12px;
      color: var(--text-2);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .16em;
    }
    .deck-stack {
      position: relative;
      width: 94px;
      height: 64px;
      margin: 18px auto 0;
      contain: layout paint style;
    }
    .deck-card {
      position: absolute;
      inset: 8px 4px;
      border-radius: 10px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 2px, transparent 2px 8px),
        linear-gradient(145deg, #240814, #9A1028 58%, #190813);
      border: 4px solid #E8D9B7;
      box-shadow: 0 12px 28px rgba(0,0,0,.34);
      transform-origin: 50% 90%;
    }
    .deck-card:nth-child(1) { transform: translate3d(-9px, 6px, 0) rotate(-9deg); opacity: .72; }
    .deck-card:nth-child(2) { transform: translate3d(0, 0, 0) rotate(-2deg); opacity: .9; }
    .deck-card:nth-child(3) { transform: translate3d(9px, -5px, 0) rotate(7deg); }

    .panel { border-radius: 24px; padding: 16px; margin-bottom: 14px; }
    .panel-tight { padding: 12px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 10px;
      color: var(--text-2);
      font-size: .74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .13em;
    }
    .section-label svg { width: 15px; height: 15px; }
    .muted { color: var(--text-2); }
    .tiny { color: var(--text-3); font-size: .75rem; }
    .stack { display: grid; gap: 10px; }

    .setup-topline {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .setup-count {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 800;
      font-size: .76rem;
    }

    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .name-input {
      min-width: 0;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.09);
      outline: none;
      background: rgba(0,0,0,.28);
      color: var(--text);
      padding: 0 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .name-input:focus { border-color: rgba(212,170,20,.36); box-shadow: 0 0 0 3px rgba(212,170,20,.10), inset 0 1px 0 rgba(255,255,255,.05); }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 14px;
      padding: 0 16px;
      font-weight: 700;
      font-size: .86rem;
      letter-spacing: 0;
      transition: transform .18s var(--spring), opacity .18s var(--steady), border-color .18s var(--steady), background .18s var(--steady);
      transform: translateZ(0);
      user-select: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.975) translateZ(0); }
    .btn svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .btn-primary {
      color: #fff8e8;
      background: linear-gradient(180deg, #D81436, #961225);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 18px 34px rgba(184,18,40,.32);
    }
    .btn-gold {
      color: #19100A;
      background: linear-gradient(180deg, #F1C640, #B8920C);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.38), 0 18px 34px rgba(184,146,12,.25);
    }
    .btn-ghost {
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.09);
      color: var(--text);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      backdrop-filter: blur(22px) saturate(160%);
    }
    .btn-danger {
      color: white;
      background: linear-gradient(180deg, #D81436, #7E0E1D);
    }
    .btn-block { width: 100%; }
    .btn-icon { width: 46px; padding: 0; }

    .notice {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 16px;
      margin-top: 12px;
      font-size: .82rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
    }
    .notice svg { width: 17px; height: 17px; flex: 0 0 auto; }
    .notice.ok { color: #A8E8BF; border-color: rgba(34,176,96,.25); }
    .notice.warn { color: #F2D779; border-color: rgba(212,170,20,.24); }
    .notice.err { color: #FF9AAB; border-color: rgba(216,20,54,.28); }
    .risk-meter {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
    }
    .risk-orb {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--text);
      background: rgba(255,255,255,.06);
    }
    .risk-meter.ok .risk-orb { color: #A8E8BF; background: rgba(34,176,96,.14); }
    .risk-meter.warn .risk-orb { color: #F2D779; background: rgba(212,170,20,.13); }
    .risk-meter.err .risk-orb { color: #FF9AAB; background: rgba(216,20,54,.14); }
    .risk-title { font-weight: 900; }
    .risk-copy { margin-top: 3px; color: var(--text-2); font-size: .78rem; line-height: 1.32; }
    .utility-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .player-list { display: grid; gap: 9px; }
    .person-row {
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 18px;
      animation: rowIn .36s var(--spring) both;
      animation-delay: calc(var(--i, 0) * 36ms);
      contain: layout paint style;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translate3d(0, 12px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    .row-num {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      color: var(--gold-hot);
      font-weight: 700;
      font-size: .84rem;
    }
    .player-name {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .skeleton { height: 58px; border-radius: 18px; background: linear-gradient(90deg, rgba(255,255,255,.035), rgba(255,255,255,.07), rgba(255,255,255,.035)); opacity: .55; }

    .config-list { display: grid; gap: 10px; }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .preset-card {
      min-height: 92px;
      border-radius: 18px;
      padding: 11px;
      text-align: left;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.07);
      transition: transform .18s var(--spring), background .18s var(--steady), border-color .18s var(--steady);
    }
    .preset-card:active { transform: scale(.975); }
    .preset-card.active {
      background: rgba(212,170,20,.12);
      border-color: rgba(212,170,20,.42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 12px 30px rgba(184,146,12,.14);
    }
    .preset-name { font-weight: 900; font-size: .86rem; }
    .preset-sub { margin-top: 6px; color: var(--text-2); font-size: .72rem; line-height: 1.25; }
    .config-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.06);
    }
    .config-name { font-weight: 700; }
    .config-meta { margin-top: 3px; color: var(--text-2); font-size: .76rem; }
    .deck-preview {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      margin-top: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .deck-preview::-webkit-scrollbar { display: none; }
    .role-mini {
      min-width: 92px;
      border-radius: 16px;
      padding: 10px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.07);
    }
    .role-mini-value {
      font-family: "Cormorant Garamond", Georgia, serif;
      color: var(--gold-hot);
      font-weight: 800;
      font-size: 1.25rem;
      line-height: .9;
    }
    .role-mini-name { margin-top: 6px; font-weight: 800; font-size: .76rem; }
    .role-mini-count { margin-top: 3px; color: var(--text-2); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; }
    .role-compendium {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .role-info {
      border-radius: 16px;
      padding: 10px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.07);
    }
    .role-info-top {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      font-size: .78rem;
    }
    .role-info-copy { margin-top: 6px; color: var(--text-2); font-size: .72rem; line-height: 1.28; }
    .stepper { display: grid; grid-template-columns: 38px 34px 38px; align-items: center; gap: 4px; }
    .stepper button {
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
    }
    .stepper svg { width: 17px; height: 17px; }
    .stepper-value { text-align: center; color: var(--text); font-weight: 800; }
    .toggle {
      width: 58px;
      height: 34px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.09);
      transition: background .2s var(--steady), border-color .2s var(--steady);
    }
    .toggle span {
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(226,214,192,.88);
      transition: transform .28s var(--spring), background .2s var(--steady);
      box-shadow: 0 4px 14px rgba(0,0,0,.32);
    }
    .toggle.on { background: rgba(184,146,12,.32); border-color: rgba(212,170,20,.44); }
    .toggle.on span { transform: translate3d(24px,0,0); background: #F3D46E; }

    .validation {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 50px;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: .84rem;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      margin-bottom: 14px;
    }
    .validation.ok { color: #A8E8BF; border-color: rgba(34,176,96,.22); }
    .validation.warn { color: #E5C15A; border-color: rgba(212,170,20,.22); }
    .validation.err { color: #FF8EA0; border-color: rgba(216,20,54,.28); }

    .header {
      position: sticky;
      top: calc(var(--safe-top) + 8px);
      z-index: 7;
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 14px;
      transform: translateZ(0);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2rem;
      line-height: 1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .subtitle { margin-top: 5px; color: var(--text-2); font-size: .82rem; }
    .phase-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.045);
      color: var(--text);
      font-weight: 800;
      font-size: .73rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .phase-pill svg { width: 15px; height: 15px; }
    .safe-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      color: #A8E8BF;
      background: rgba(34,176,96,.10);
      border: 1px solid rgba(34,176,96,.22);
      font-size: .7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .safe-pill svg { width: 14px; height: 14px; }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      padding: 12px 14px calc(var(--safe-bottom) + 12px);
      background: linear-gradient(180deg, transparent, rgba(7,5,13,.88) 30%, rgba(7,5,13,.98));
      pointer-events: none;
    }
    .bottom-inner {
      width: min(100%, 560px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: auto;
    }
    .bottom-inner.single { grid-template-columns: 1fr; }

    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--safe-bottom) + 86px);
      z-index: 9;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: var(--text);
      transform: translateZ(0);
    }
    .fab svg { width: 23px; height: 23px; }
    body.night .fab { animation: pulseRed 1.5s ease-in-out infinite; }
    @keyframes pulseRed {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 rgba(216,20,54,0), 0 18px 44px rgba(0,0,0,.5); }

    const state = {

      config: { ...DEFAULT_CONFIG },

    function esc(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function icon(name) {
      return ICON[name] || ICON.info;

    function alive(players = state.players) {
      return players.filter((p) => p.alive);
    }

    function byId(id, players = state.players) {
      return players.find((p) => p.id === id) || null;
    }

    function aliveRole(role, players = state.players) {
      return players.filter((p) => p.alive && p.role === role);
    }

    function activeKillerIds(players = state.players) {
      return players
        .filter((p) => p.alive && (p.role === "killer" || (p.role === "torturer" && p.promoted)))
        .map((p) => p.id);
    }

    function normalizeName(value) {
      return String(value == null ? "" : value).trim().replace(/\s+/g, " ");
    }

    function canonicalName(value) {
      return normalizeName(value).toLocaleLowerCase();
    }

    function hasDuplicateNames(players = state.players) {
      const seen = new Set();
      return players.some((player) => {
        const key = canonicalName(player.name);
        if (!key) return false;
        if (seen.has(key)) return true;
        seen.add(key);
        return false;
      });
    }

    function configMatches(a, b) {
      return ["killers", "torturers", "doctors", "detectives", "whore", "joker"].every((key) => a[key] === b[key]);
    }

    function selectedPresetId(config = state.config) {
      const preset = PRESETS.find((item) => configMatches(config, item.config));
      return preset ? preset.id : "custom";
    }

    function totalAssignedRoles(config = state.config) {
      return config.killers + config.torturers + config.doctors + config.detectives + (config.whore ? 1 : 0) + (config.joker ? 1 : 0);
    }

    function civilianCount(config = state.config, players = state.players) {
      return Math.max(0, players.length - totalAssignedRoles(config));
    }

    function deckCounts(config = state.config, players = state.players) {
      return [
        ["killer", config.killers],
        ["torturer", config.torturers],
        ["doctor", config.doctors],
        ["detective", config.detectives],
        ["whore", config.whore ? 1 : 0],
        ["joker", config.joker ? 1 : 0],
        ["civilian", civilianCount(config, players)]
      ].filter(([, count]) => count > 0);
    }

    function validation(config = state.config, players = state.players) {
      const total = totalAssignedRoles(config);
      const townSlots = civilianCount(config, players) + config.doctors + config.detectives;
      const mafiaSlots = config.killers + config.torturers;
      if (players.length === 0) return { level: "warn", text: "Add at least 3 players to deal." };
      if (players.length < 3) return { level: "err", text: `Need at least 3 players. You have ${players.length}.` };
      if (players.length > 24) return { level: "err", text: "Keep the table to 24 players or fewer." };
      if (hasDuplicateNames(players)) return { level: "err", text: "Player names must be unique." };
      if (config.killers < 1) return { level: "err", text: "At least one Killer is required." };
      if (total > players.length) return { level: "err", text: `${total} roles selected for ${players.length} players.` };
      if (townSlots < 1) return { level: "err", text: "Add at least one Town player or leave room for a Civilian." };
      if (mafiaSlots >= townSlots) return { level: "err", text: "Town must outnumber Mafia when cards are dealt." };
      return { level: "ok", text: `Ready. ${civilianCount(config, players)} Civilian${civilianCount(config, players) === 1 ? "" : "s"} will fill the deck.` };
    }

    function isValidSetup() {
      return validation().level === "ok";
    }

    function recommendedConfigForPlayerCount(count) {
      if (count <= 4) return { killers: 1, torturers: 0, doctors: 0, detectives: 0, whore: false, joker: false };
      if (count <= 6) return { killers: 1, torturers: 0, doctors: 1, detectives: 1, whore: false, joker: false };
      if (count <= 8) return { killers: 2, torturers: 0, doctors: 1, detectives: 1, whore: false, joker: false };
      if (count <= 11) return { killers: 2, torturers: 1, doctors: 1, detectives: 1, whore: true, joker: false };
      return { killers: 3, torturers: 1, doctors: 2, detectives: 1, whore: true, joker: true };
    }

    function setupRiskProfile(config = state.config, players = state.players) {
      const v = validation(config, players);
      const mafiaSlots = config.killers + config.torturers;
      const specials = config.torturers + config.doctors + config.detectives + (config.whore ? 1 : 0) + (config.joker ? 1 : 0);
      const civs = civilianCount(config, players);
      if (v.level === "err") return { level: "err", title: "Fix before dealing", text: v.text };
      if (players.length < 5) return { level: "warn", title: "Tiny table", text: "Great for teaching, but reads are swingy and one vote can decide the room." };
      if (mafiaSlots >= Math.max(1, civs + config.doctors + config.detectives - 1)) return { level: "warn", title: "Mafia pressure high", text: "The Mafia side is close to parity. Expect a fast, tense game." };
      if (specials > Math.ceil(players.length / 2)) return { level: "warn", title: "Chaos-heavy setup", text: "More than half the table has powers. Fun, but harder for new players." };
      if (civs >= Math.ceil(players.length / 2)) return { level: "ok", title: "Readable table", text: "Enough civilians remain for bluffing, pressure, and social deduction." };
      return { level: "ok", title: "Balanced pressure", text: "The role mix has information, protection, and room for lies." };
    }

    function isPublicSafePhase() {
      return state.phase === "day" || state.phase === "vote" || state.screen === "setup";
    }

    function dashboardSummary() {
      const counts = liveCounts();
      const publicSafe = isPublicSafePhase();
      const objective = state.screen === "setup"
        ? "Seat the table and deal when the setup meter is healthy."
        : state.screen === "reveal"
          ? "Pass the phone privately until every player has seen exactly one card."
          : state.screen === "gameover"
            ? "Read the final result, then replay with the same table or reset."
            : state.phase === "night"
              ? `Guide ${STEP_META[currentStep()] ? STEP_META[currentStep()].title : "the night"} and keep the phone hidden.`
              : state.phase === "dawn"
                ? "Announce only the dawn report. Keep private choices private."
                : state.phase === "vote"
                  ? "Run the vote. Confirm before any elimination becomes public."
                  : "Watch the table, manage discussion, then start voting or night.";

        ? (isValidSetup() ? "Deal cards." : validation().text)
        : state.screen === "reveal"
          ? (state.cardFlipped ? "Pass to the next player." : "Let the current player tap their card.")
          : state.screen === "gameover"
            ? "Start a new game or replay with the same table."
            : state.phase === "night"
              ? (currentStep() ? `Resolve ${STEP_META[currentStep()].title}.` : "Resolve night.")
              : state.phase === "dawn"
                ? "Begin the next day."
                : state.phase === "vote"
                  ? "Finish ballots or resolve the tally."
                  : "Start Vote when discussion is ready.";
      return { counts, publicSafe, objective, next, phase: state.phase, screen: state.screen };
    }

    function discussionPrompt() {
      const index = Math.abs((Number(state.dayPromptIndex) || 0) + state.round - 1) % DAY_PROMPTS.length;
      return DAY_PROMPTS[index];
    }

    function scheduleRender(resetScroll) {
      if (resetScroll) resetScrollNext = true;
      queuePersist();
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(render);
    }

    function navigate(screen, phase) {
      const nextKey = `${screen}:${phase || ""}`;
      const changed = nextKey !== state.transitionKey;
      state.screen = screen;
      if (phase) state.phase = phase;
      state.transitionKey = nextKey;
      if (changed) {
        app.classList.add("is-moving");
        setTimeout(() => {
          app.classList.remove("is-moving");
          scheduleRender(true);
        }, 120);
      }
      scheduleRender(changed);
    }

      renderQueued = false;
      document.body.classList.toggle("night", state.phase === "night" || state.phase === "dawn" || state.screen === "reveal");
      document.body.classList.toggle("has-toast", Boolean(state.undo));
      document.body.classList.toggle("low-blur", Boolean(state.settings.lowBlur));

      modalRoot.innerHTML = renderModal();
      toastRoot.innerHTML = renderToast();
      if (resetScrollNext) {
        resetScrollNext = false;
        requestAnimationFrame(() => { app.scrollTop = 0; });
      }
    }

    function renderScreen() {
      if (state.screen === "setup") return renderSetup();
      if (state.screen === "reveal") return renderReveal();
      if (state.screen === "gameover") return renderGameOver();
      if (state.phase === "night") return renderNight();
      if (state.phase === "dawn") return renderDawn();
      if (state.phase === "vote") return renderVote();
      return renderDay();
    }

    function renderSetup() {
      const v = validation();
      const players = state.players.length
        ? `<div class="player-list">${state.players.map((p, i) => renderSetupPlayer(p, i)).join("")}</div>`

      const presetId = selectedPresetId();
      const risk = setupRiskProfile();
      return `
        <section class="screen">
          <div class="logo-wrap">
            <div class="logo">MAFIA</div>
            <div class="suits">♠ &nbsp; ♥ &nbsp; ♦ &nbsp; ♣</div>
            <div class="kicker">One phone. Closed eyes. Bad alibis.</div>
            <div class="deck-stack" aria-hidden="true"><span class="deck-card"></span><span class="deck-card"></span><span class="deck-card"></span></div>
          </div>
          <div class="panel glass">
            <div class="setup-topline">
              <div class="section-label" style="margin:0">${icon("users")} Players</div>
              <div class="setup-count">${state.players.length}/24 seated</div>
            </div>
            <div class="input-row">
              <input class="name-input" id="player-name-field" value="${esc(state.currentName)}" maxlength="22" autocomplete="off" autocorrect="off" autocapitalize="words" placeholder="Player name">
              <button class="btn btn-gold" data-action="add-player">${icon("plus")} Add</button>
            </div>
            ${renderSetupNotice()}
            <div class="utility-grid">
              <button class="btn btn-ghost" data-action="quick-seats">${icon("users")} Quick 8</button>
              <button class="btn btn-ghost" data-action="codenames">${icon("mask")} Codenames</button>
              <button class="btn btn-ghost" data-action="shuffle-seats" ${state.players.length < 2 ? "disabled" : ""}>${icon("cards")} Shuffle</button>
              <button class="btn btn-ghost" data-action="recommend-roles">${icon("check")} Recommend</button>
              <button class="btn btn-ghost" data-action="open-settings">${icon("panel")} Settings</button>
            </div>
            <div style="height:12px"></div>
            ${players}
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("cards")} Preset</div>
            <div class="preset-grid">
              ${PRESETS.map((preset) => renderPreset(preset, presetId)).join("")}
            </div>
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("cards")} Roles</div>
            <div class="config-list">
              ${renderStepper("killers", "Killers", "Mafia", 1, 10)}
              ${renderStepper("torturers", "Torturers", "Mafia", 0, 8)}
              ${renderStepper("doctors", "Doctors", "Town", 0, 6)}
              ${renderStepper("detectives", "Detectives", "Town", 0, 6)}
              ${renderToggle("whore", "Whore", "Neutral")}
              ${renderToggle("joker", "Joker", "Neutral")}
            </div>
            ${renderDeckPreview()}
          </div>
          <div class="risk-meter ${risk.level}">
            <div class="risk-orb">${icon(risk.level === "ok" ? "check" : "info")}</div>
            <div>
              <div class="risk-title">${esc(risk.title)}</div>
              <div class="risk-copy">${esc(risk.text)}</div>
            </div>
          </div>
          <div class="panel glass panel-tight">
            <div class="section-label">${icon("info")} Role guide</div>
            ${renderRoleCompendium()}
          </div>
          <div class="validation ${v.level}" aria-live="polite">${icon(v.level === "ok" ? "check" : "info")} <span>${esc(v.text)}</span></div>
          <button class="btn btn-primary btn-block" data-action="start-game" ${isValidSetup() ? "" : "disabled"}>${icon("cards")} Deal Cards &rarr;</button>
        </section>`;
    }

    function renderSetupNotice() {
      if (!state.setupNotice) return "";
      return `<div class="notice ${state.setupNotice.level || "warn"}" aria-live="polite">${icon(state.setupNotice.level === "ok" ? "check" : "info")}<span>${esc(state.setupNotice.text)}</span></div>`;
    }

    function renderPreset(preset, activeId) {
      return `
        <button class="preset-card ${preset.id === activeId ? "active" : ""}" data-action="apply-preset" data-preset="${preset.id}" aria-pressed="${preset.id === activeId}">
          <div class="preset-name">${esc(preset.label)}</div>
          <div class="preset-sub">${esc(preset.sub)}</div>
        </button>`;
    }

    function renderDeckPreview() {
      const counts = deckCounts();
      return `
        <div class="deck-preview" aria-label="Current deck preview">
          ${counts.map(([roleId, count]) => {
            const role = ROLE[roleId];
            return `<div class="role-mini"><div class="role-mini-value">${role.value}${role.suit}</div><div class="role-mini-name">${role.label}</div><div class="role-mini-count">${count} card${count === 1 ? "" : "s"}</div></div>`;
          }).join("")}
        </div>`;
    }

    function renderRoleCompendium() {
      const order = ["killer", "doctor", "detective", "civilian", "torturer", "whore", "joker"];
      return `<div class="role-compendium">${order.map((roleId) => {
        const role = ROLE[roleId];
        return `
          <div class="role-info">
            <div class="role-info-top">${renderRolePip(role)}<span>${role.label}</span></div>
            <div class="role-info-copy">${esc(role.description)}</div>
          </div>`;
      }).join("")}</div>`;
    }

    function renderSetupPlayer(player, index) {
      return `
        <div class="person-row glass-lite" style="--i:${index}">
          <div class="row-num">${index + 1}</div>
          <div class="player-name">${esc(player.name)}</div>
          <button class="btn btn-ghost btn-icon" aria-label="Remove ${esc(player.name)}" data-action="remove-player" data-id="${player.id}">${icon("x")}</button>
        </div>`;
    }

    function renderStepper(key, label, team, min, max) {
      const value = state.config[key];
      const roleId = key === "killers" ? "killer" : key === "torturers" ? "torturer" : key === "doctors" ? "doctor" : "detective";
      const role = ROLE[roleId];
      return `
        <div class="config-row">
          <div>
            <div class="config-name">${label}</div>
            <div class="config-meta">${team} - ${role.night}</div>
          </div>
          <div class="stepper">
            <button data-action="config-step" data-key="${key}" data-delta="-1" ${value <= min ? "disabled" : ""} aria-label="Decrease ${label}">${icon("minus")}</button>
            <div class="stepper-value">${value}</div>
            <button data-action="config-step" data-key="${key}" data-delta="1" ${value >= max ? "disabled" : ""} aria-label="Increase ${label}">${icon("plus")}</button>
          </div>
        </div>`;
    }

    function renderToggle(key, label, team) {
      const on = state.config[key];
      const role = ROLE[key];
      return `
        <button class="config-row" data-action="config-toggle" data-key="${key}" aria-pressed="${on}">
          <div style="text-align:left">
            <div class="config-name">${label}</div>
            <div class="config-meta">${team} - ${role.night}</div>
          </div>
          <span class="toggle ${on ? "on" : ""}"><span></span></span>
        </button>`;
    }

    function renderReveal() {
      const player = state.players[state.revealIndex];
      if (!player) return "";
      const role = ROLE[player.role];
      const last = state.revealIndex === state.players.length - 1;
      const nextName = last ? "Narrator" : state.players[state.revealIndex + 1].name;
      return `
        <section class="screen reveal-screen">
          <div class="reveal-top">
            <div>
              <div class="reveal-count">${state.revealIndex + 1} of ${state.players.length}</div>
              <div class="reveal-name">${esc(player.name)}</div>
            </div>
            <button class="btn btn-ghost reveal-reset" data-action="new-game">${icon("x")} Reset</button>
          </div>
          <button class="card-scene" style="--deal-index:${state.revealIndex}" data-action="flip-card" aria-label="Reveal card for ${esc(player.name)}">
            <div class="playing-card ${state.cardFlipped ? "flipped" : ""}">
              <div class="card-face card-back">
                <div class="card-back-mark">MAFIA</div>
              </div>
              ${state.cardFlipped ? renderPlayingCard(role, true) : renderHiddenCardFront()}
            </div>
          </button>
          <div>
            <div class="reveal-hint">${state.cardFlipped ? `Memorize the role, then pass the phone face-down.` : `Only ${esc(player.name)} should look. Tap the card when ready.`}</div>
            ${state.cardFlipped ? `<div style="height:12px"></div><button class="btn btn-primary btn-block" data-action="next-reveal">${last ? "Hand to Narrator" : `Pass to ${esc(nextName)}`} &rarr;</button>` : ""}
          </div>
        </section>`;
    }

    function renderPlayingCard(role, revealed = true) {
      const teamClass = role.team === "mafia" ? "mafia" : role.team === "neutral" ? "neutral" : "";
      const pipClass = role.color === "red" ? "red-pip" : role.color === "gold" ? "gold-pip" : "black-pip";
      return `
        <div class="card-face card-front ${teamClass}" aria-hidden="${revealed ? "false" : "true"}">
          <div class="card-corner ${pipClass}">${role.value}<br>${role.suit}</div>
          <div class="card-corner br ${pipClass}">${role.value}<br>${role.suit}</div>
          <div class="card-center">
            <div>
              <div class="card-value">${role.value}</div>
              <div class="card-suit ${pipClass}">${role.suit}</div>
              <div class="card-role">${role.label}</div>
              <div class="card-description">${esc(role.description)}</div>
            </div>
          </div>
        </div>`;
    }

    function renderHiddenCardFront() {
      return `<div class="card-face card-front" aria-hidden="true"></div>`;
    }

    function renderHeader(phaseLabel, iconName, sub) {
      return `
        <header class="header glass">
          <div class="header-top">
            <div>
              <div class="title">Round ${state.round}</div>
              <div class="subtitle">${sub}</div>
            </div>
            <div class="phase-pill">${icon(iconName)} ${phaseLabel}</div>
          </div>
          ${isPublicSafePhase() ? `<div class="safe-pill">${icon("shield")} Public safe - living roles hidden</div>` : ""}
          ${state.phase === "night" ? `<div class="progress-dots">${state.night.steps.map((_, i) => `<span class="dot ${i < state.night.index ? "done" : i === state.night.index ? "active" : ""}"></span>`).join("")}</div>` : ""}
          ${state.phase === "vote" && state.vote && state.vote.voters.length ? `<div class="progress-dots">${state.vote.voters.map((_, i) => `<span class="dot ${i < state.vote.index ? "done" : i === state.vote.index ? "active" : ""}"></span>`).join("")}</div>` : ""}
        </header>`;
    }

    function renderDay() {
      const live = alive();
      const dead = state.players.filter((p) => !p.alive);
      return `
        <section class="screen">
          ${renderHeader("Day", "sun", `${live.length} alive - discuss, accuse, then vote`)}
          <div class="vote-card glass">
            <div class="vote-kicker">Discussion</div>
            <div class="vote-name">Find the lie</div>
            <div class="vote-copy">Let the table talk. When accusations settle, start a structured phone vote or go straight to night with no elimination.</div>
          </div>
          <div class="pressure-card glass-lite">
            <div class="pressure-mark">${icon("sun")}</div>
            <div>
              <div class="pressure-title">Pressure prompt</div>
              <div class="pressure-text">${esc(discussionPrompt())}</div>
            </div>
            <button class="icon-btn" data-action="next-prompt" aria-label="New pressure prompt">${icon("panel")}</button>
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("users")} Alive</div>
            ${live.map((p, i) => renderPlayerRow(p, { index: i, hideRole: true })).join("")}
            ${dead.length ? `<div class="boneyard"><div class="section-label">${icon("skull")} Boneyard</div>${dead.map((p, i) => renderPlayerRow(p, { index: i, dead: true })).join("")}</div>` : ""}
          </div>
          ${renderFab()}
          <div class="bottom-actions">
            <div class="bottom-inner">
              <button class="btn btn-ghost" data-action="skip-vote">No Elimination</button>
              <button class="btn btn-primary" data-action="start-vote">${icon("users")} Start Vote</button>
            </div>
          </div>
        </section>`;
    }

    function renderVote() {
      const vote = state.vote || createVoteState();
      const current = currentVoter(vote);
      const summary = voteSummary(vote);
      if (!current) return renderVoteResult(summary);
      const candidates = alive();
      return `
        <section class="screen">
          ${renderHeader("Vote", "users", `Ballot ${vote.index + 1} of ${vote.voters.length}`)}
          <div class="vote-card glass">
            <div class="vote-kicker">Current voter</div>
            <div class="vote-name">${esc(current.name)}</div>
            <div class="vote-copy">Pass the phone to ${esc(current.name)}. They choose one player to eliminate, or abstain.</div>
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("skull")} Vote for elimination</div>
            ${candidates.map((p, i) => renderPlayerRow(p, { index: i, action: "cast-vote", hideRole: true })).join("")}
            <button class="game-row glass-lite" style="--i:${candidates.length}" data-action="cast-vote" data-id="">
              <div class="role-pip">${icon("x")}</div>
              <div style="text-align:left; min-width:0">
                <div class="player-name">Abstain</div>
                <div class="row-sub"><span>No vote from this player</span></div>
              </div>
            </button>
          </div>
          ${renderFab()}
          <div class="bottom-actions">
            <div class="bottom-inner single">
              <button class="btn btn-ghost" data-action="cancel-vote">Back to Discussion</button>
            </div>
          </div>
        </section>`;
    }

    function renderVoteResult(summary) {
      const winner = summary.winnerId ? byId(summary.winnerId) : null;
      const title = winner ? `${winner.name} has the table` : summary.tie ? "Vote tied" : "No elimination";
      const sub = winner
        ? `${winner.name} received ${summary.highest} vote${summary.highest === 1 ? "" : "s"}. Confirm before revealing the boneyard.`
        : summary.tie
          ? "The highest vote is tied. The table can revote or go to night."
          : "No valid votes were cast. Continue to night or restart the vote.";
      const tieActions = summary.tie
        ? `<button class="btn btn-ghost" data-action="skip-vote">No Elimination</button><button class="btn btn-primary" data-action="random-tied">${icon("cards")} Random Tied</button>`
        : "";
      return `
        <section class="screen">
          ${renderHeader("Vote", "users", "Table result")}
          <div class="result-banner glass">
            ${icon(winner ? "skull" : "info")}
            <div>
              <div class="result-title">${esc(title)}</div>
              <div class="result-sub">${esc(sub)}</div>
            </div>
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("log")} Tally</div>
            <div class="tally-list">
              ${summary.rows.length ? summary.rows.map((row) => renderTallyRow(row, summary.winnerId)).join("") : `<div class="event-row glass-lite info">${icon("info")}<div><div class="event-title">No votes</div><div class="event-msg">Everyone abstained or no one could vote.</div></div></div>`}
            </div>
          </div>
          ${renderFab()}
          <div class="bottom-actions">
            <div class="bottom-inner">
              <button class="btn btn-ghost" data-action="restart-vote">Revote</button>
              ${winner ? `<button class="btn btn-danger" data-action="open-final-words" data-id="${winner.id}">${icon("skull")} Confirm</button>` : tieActions || `<button class="btn btn-primary" data-action="skip-vote">${icon("moon")} Begin Night</button>`}
            </div>
          </div>
        </section>`;
    }

    function renderTallyRow(row, winnerId) {
      return `
        <div class="tally-row ${row.id === winnerId ? "winner" : ""}">
          <div>
            <div class="tally-name">${esc(row.name)}</div>
            <div class="tiny">${row.voters.map(esc).join(", ") || "No voters"}</div>
          </div>
          <div class="tally-count">${row.count}</div>
        </div>`;
    }

    function renderPlayerRow(player, opts = {}) {
      const revealRole = !opts.hideRole || !player.alive;
      const role = ROLE[player.role || "civilian"];
      const badges = [];
      if (!player.canTalk) badges.push(`<span class="badge gold">${icon("mouth")} Muted</span>`);
      if (!player.canVote) badges.push(`<span class="badge gold">${icon("hand")} No vote</span>`);
      if (player.promoted && revealRole) badges.push(`<span class="badge red">${icon("crown")} Killer</span>`);
      if (!player.alive) badges.push(`<span class="badge">${icon("skull")} Dead</span>`);
      const selected = opts.selected ? "selected" : "";
      const dead = opts.dead || !player.alive ? "dead" : "";
      const action = opts.action ? `data-action="${opts.action}" data-id="${player.id}"` : "";
      return `
        <button class="game-row glass-lite ${selected} ${dead}" style="--i:${opts.index || 0}" ${action}>
          ${revealRole ? renderRolePip(role) : renderHiddenRolePip()}
          <div style="text-align:left; min-width:0">
            <div class="player-name">${esc(player.name)}</div>
            <div class="row-sub"><span>${revealRole ? role.label : "Role hidden"}</span>${badges.join("")}</div>
          </div>
          ${opts.selected ? `<div class="row-check">${icon("check")}</div>` : ""}
        </button>`;
    }

    function renderRolePip(role) {
      const team = role.team === "mafia" ? "mafia" : "";
      const color = role.color === "red" ? "red-pip" : role.color === "gold" ? "gold-pip" : "";
      return `<div class="role-pip ${team} ${color}"><span>${role.value}</span><span class="pip-suit">${role.suit}</span></div>`;
    }

    function renderHiddenRolePip() {
      return `<div class="role-pip"><span>?</span><span class="pip-suit">♠</span></div>`;
    }

    function renderFab() {
      if (state.screen === "setup" || state.screen === "reveal") return "";
      return `<button class="fab glass" data-action="open-narrator" aria-label="Open narrator panel">${icon("panel")}</button>`;
    }

    function renderNight() {
      const step = state.night.steps[state.night.index];
      if (!step) return "";
      return `
        <section class="screen">
          ${renderHeader("Night", "moon", `Step ${state.night.index + 1} of ${state.night.steps.length}`)}
          ${renderNightStep(step)}
          ${renderFab()}
        </section>`;
    }

    function renderNightStep(stepId) {
      const meta = STEP_META[stepId];
      const suggestion = state.night.actions.jokerSuggestion ? byId(state.night.actions.jokerSuggestion) : null;
      const suggestionHint = suggestion && stepId !== "joker" ? `<div class="hint">${icon("mask")} Joker suggested ${esc(suggestion.name)}.</div>` : "";
      return `
        <div class="step-card glass" style="--glow:${meta.glow}">
          <div class="section-label">${icon(meta.icon)} Night action</div>
          <div class="step-title">${meta.title}</div>
          <div class="step-copy">${stepIntro(stepId)}</div>
          <div class="script-box">${meta.script}</div>
        </div>
        ${suggestionHint}
        ${stepBody(stepId)}
        <div class="bottom-actions">
          <div class="bottom-inner">
            <button class="btn btn-ghost" data-action="skip-step">Skip</button>
            <button class="btn btn-primary" data-action="next-step" ${stepCanAdvance(stepId) ? "" : "disabled"}>${stepId === "detective" ? "Finish Night" : "Next"} &rarr;</button>
          </div>
        </div>`;
    }

    function stepIntro(stepId) {
      const a = state.night.actions;
      if (stepId === "kill") {
        const killers = state.players.filter((p) => p.alive && activeKillerIds().includes(p.id));
        return `${killers.map((p) => esc(p.name)).join(", ")} choose one shared target.`;
      }
      if (stepId === "torturer") return "Mouth blocks speech. Hands blocks voting. Self-targets and Mafia targets are valid.";
      if (stepId === "doctor") {
        const actor = getDoctorActor();
        return state.round === 1 ? `${esc(actor ? actor.name : "Doctor")} cannot self-save in round 1.` : "Choose one player to protect.";
      }
      if (stepId === "detective" && a.detectiveCheck) {
        const target = byId(a.detectiveCheck);
        if (target) return `${esc(target.name)} is ready for a private narrator result.`;
      }
      return STEP_META[stepId].script;
    }

    function stepBody(stepId) {
      if (stepId === "joker") return stepJoker();
      if (stepId === "kill") return stepKill();
      if (stepId === "torturer") return stepTorturer();
      if (stepId === "whore") return stepWhore();
      if (stepId === "doctor") return stepDoctor();
      if (stepId === "detective") return stepDetective();
      return "";
    }

    function stepCanAdvance(stepId = currentStep(), actions = state.night.actions) {
      if (!stepId) return true;
      if (stepId === "joker") return !actions.jokerAwake || Boolean(actions.jokerSuggestion);
      if (stepId === "kill") return Boolean(actions.killTarget);
      if (stepId === "torturer") return Boolean(actions.tortureMode && actions.tortureTarget);
      if (stepId === "whore") return Boolean(actions.whoreTarget);
      if (stepId === "doctor") return Boolean(actions.doctorSave);
      if (stepId === "detective") return Boolean(actions.detectiveCheck);
      return true;
    }

    function nightTargetList(players, selectedId) {
      return `<div class="player-list">${players.map((p, i) => renderPlayerRow(p, { index: i, action: "night-pick", selected: p.id === selectedId })).join("")}</div>`;
    }

    function stepJoker() {
      const a = state.night.actions;
      const targets = alive().filter((p) => p.role !== "joker");
      return `
        <div class="action-grid">
          <button class="action-tile ${a.jokerAwake ? "selected" : ""}" data-action="toggle-joker" data-mode="awake">${icon("eye")}<div class="action-title">Woke up</div><div class="action-sub">Point to a target</div></button>
          <button class="action-tile ${!a.jokerAwake ? "selected" : ""}" data-action="toggle-joker" data-mode="sleep">${icon("sleep")}<div class="action-title">Sleeping</div><div class="action-sub">No suggestion</div></button>
        </div>
        ${a.jokerAwake ? `<div class="section-label">${icon("mask")} Suggested target</div>${nightTargetList(targets, a.jokerSuggestion)}` : ""}`;
    }

    function stepKill() {
      const killerSet = new Set(activeKillerIds());
      const targets = alive().filter((p) => !killerSet.has(p.id));
      return `<div class="section-label">${icon("blade")} Shared kill target</div>${nightTargetList(targets, state.night.actions.killTarget)}`;
    }

    function stepTorturer() {
      const a = state.night.actions;
      return `
        <div class="action-grid">
          <button class="action-tile ${a.tortureMode === "mouth" ? "selected" : ""}" data-action="torture-mode" data-mode="mouth">${icon("mouth")}<div class="action-title">Mouth</div><div class="action-sub">Cannot speak today</div></button>
          <button class="action-tile ${a.tortureMode === "hands" ? "selected" : ""}" data-action="torture-mode" data-mode="hands">${icon("hand")}<div class="action-title">Hands</div><div class="action-sub">Cannot vote today</div></button>
        </div>
        ${a.tortureMode ? `<div class="section-label">${icon("bind")} Target</div>${nightTargetList(torturerTargets(), a.tortureTarget)}` : ""}`;
    }

    function stepWhore() {
      const targets = alive().filter((p) => p.role !== "whore");
      return `<div class="section-label">${icon("heart")} Bed partner</div>${nightTargetList(targets, state.night.actions.whoreTarget)}`;
    }

    function stepDoctor() {
      const doctors = aliveRole("doctor");
      const actor = getDoctorActor();
      const actorChooser = doctors.length > 1 && state.round === 1
        ? `<div class="section-label">${icon("shield")} Acting Doctor</div><div class="player-list">${doctors.map((p, i) => renderPlayerRow(p, { index: i, action: "doctor-actor", selected: actor && p.id === actor.id })).join("")}</div>`
        : "";
      return `${actorChooser}<div class="section-label">${icon("shield")} Protected player</div>${nightTargetList(doctorTargets(actor ? actor.id : null), state.night.actions.doctorSave)}`;
    }

    function stepDetective() {
      const a = state.night.actions;
      const detectives = aliveRole("detective");
      const targets = alive().filter((p) => p.role !== "detective");
      const target = a.detectiveCheck ? byId(a.detectiveCheck) : null;
      const result = target ? detectiveResult(target, detectives[0]) : "";

    function renderNarratorRoles() {
      if (!state.narratorTruthUnlocked) {
        return `
          <div class="truth-gate">
            <div>
              <div class="truth-icon">${icon("shield")}</div>
              <div class="dashboard-title">Role truth is locked</div>
              <div class="dashboard-copy">Hold the button until it unlocks. This prevents accidental role leaks when the phone is facing the table.</div>
              <button class="hold-button" data-action="hold-truth">Hold to reveal roles</button>
            </div>
          </div>`;

      return state.players.map((player, i) => {
        const controls = player.alive ? `
          <div class="row-sub">
            <button class="badge ${player.canTalk ? "" : "gold"}" data-action="toggle-talk" data-id="${player.id}">${icon("mouth")} ${player.canTalk ? "Can talk" : "Muted"}</button>
            <button class="badge ${player.canVote ? "" : "gold"}" data-action="toggle-vote" data-id="${player.id}">${icon("hand")} ${player.canVote ? "Can vote" : "No vote"}</button>
