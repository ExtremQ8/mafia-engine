      sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
      moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/></svg>',
      panel: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 9h8M8 13h5M8 17h7"/></svg>',
      log: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/></svg>',
      thumbUp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v10H4V10h3Z"/><path d="M7 10l5-7c1.5.4 2 1.7 1.3 3.3L12 9h6a2 2 0 0 1 2 2.3l-1 6A3 3 0 0 1 16 20H7"/></svg>',
      thumbDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 14V4H4v10h3Z"/><path d="M7 14l5 7c1.5-.4 2-1.7 1.3-3.3L12 15h6a2 2 0 0 0 2-2.3l-1-6A3 3 0 0 0 16 4H7"/></svg>'
    };

    const state = {
      screen: "setup",
      phase: "setup",
      players: [],
      config: { killers: 1, torturers: 0, doctors: 0, detectives: 0, whore: false, joker: false },
      currentName: "",
      revealIndex: 0,
      cardFlipped: false,
      round: 1,
      torturerPromoted: false,
      night: { steps: [], index: 0, actions: emptyActions() },
      events: [],
      history: [],
      result: null,
      modal: null,
      narratorTab: "roles",
      undo: null,
      transitionKey: "setup"
    };

    let renderQueued = false;
    let resetScrollNext = false;
    let undoTimer = 0;
    let audioCtx = null;
    let wakeLock = null;
    let wantsWakeLock = false;
    let dragSheet = null;
    let dragRaf = 0;

    const app = document.getElementById("app");
    const modalRoot = document.getElementById("modal-root");
    const toastRoot = document.getElementById("toast-root");

    function emptyActions() {
      return {
        jokerAwake: false,
        jokerSuggestion: null,
        killTarget: null,
        tortureMode: null,
        tortureTarget: null,
        whoreTarget: null,
        doctorActor: null,
        doctorSave: null,
        detectiveCheck: null
      };
    }

    function uid() {
      return "p_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
    }

    function esc(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function icon(name) {
      return ICON[name] || ICON.info;
    }

    function alive(players = state.players) {
      return players.filter((p) => p.alive);
    }

    function byId(id, players = state.players) {
      return players.find((p) => p.id === id) || null;
    }

    function aliveRole(role, players = state.players) {
      return players.filter((p) => p.alive && p.role === role);
    }

    function activeKillerIds(players = state.players) {
      return players
        .filter((p) => p.alive && (p.role === "killer" || (p.role === "torturer" && p.promoted)))
        .map((p) => p.id);
    }

    function totalAssignedRoles(config = state.config) {
      return config.killers + config.torturers + config.doctors + config.detectives + (config.whore ? 1 : 0) + (config.joker ? 1 : 0);
    }

    function civilianCount() {
      return Math.max(0, state.players.length - totalAssignedRoles());
    }

    function validation() {
      const total = totalAssignedRoles();
      const townSlots = civilianCount() + state.config.doctors + state.config.detectives;
      const mafiaSlots = state.config.killers + state.config.torturers;
      if (state.players.length === 0) return { level: "warn", text: "Add at least 3 players to deal." };
      if (state.players.length < 3) return { level: "err", text: `Need at least 3 players. You have ${state.players.length}.` };
      if (state.config.killers < 1) return { level: "err", text: "At least one Killer is required." };
      if (total > state.players.length) return { level: "err", text: `${total} roles selected for ${state.players.length} players.` };
      if (townSlots < 1) return { level: "err", text: "Add at least one Town player or leave room for a Civilian." };
      if (mafiaSlots >= townSlots) return { level: "err", text: "Town must outnumber Mafia when cards are dealt." };
      return { level: "ok", text: `Ready. ${civilianCount()} Civilian${civilianCount() === 1 ? "" : "s"} will fill the deck.` };
    }

    function isValidSetup() {
      return validation().level === "ok";
    }

    function scheduleRender(resetScroll) {
      if (resetScroll) resetScrollNext = true;
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(render);
    }

    function navigate(screen, phase) {
      const nextKey = `${screen}:${phase || ""}`;
      const changed = nextKey !== state.transitionKey;
      state.screen = screen;
      if (phase) state.phase = phase;
      state.transitionKey = nextKey;
      if (changed) {
        app.classList.add("is-moving");
        setTimeout(() => {
          app.classList.remove("is-moving");
          scheduleRender(true);
        }, 120);
      }
      scheduleRender(changed);
    }

    function render() {
      renderQueued = false;
      document.body.classList.toggle("night", state.phase === "night" || state.phase === "dawn" || state.screen === "reveal");
      app.innerHTML = renderScreen();
      modalRoot.innerHTML = renderModal();
      toastRoot.innerHTML = renderToast();
      if (resetScrollNext) {
        resetScrollNext = false;
        requestAnimationFrame(() => { app.scrollTop = 0; });
      }
    }

    function renderScreen() {
      if (state.screen === "setup") return renderSetup();
      if (state.screen === "reveal") return renderReveal();
      if (state.screen === "gameover") return renderGameOver();
      if (state.phase === "night") return renderNight();
      if (state.phase === "dawn") return renderDawn();
      return renderDay();
    }

    function renderSetup() {
      const v = validation();
      const players = state.players.length
        ? `<div class="player-list">${state.players.map((p, i) => renderSetupPlayer(p, i)).join("")}</div>`
        : `<div class="player-list">${[0,1,2].map(() => '<div class="skeleton"></div>').join("")}</div>`;
      return `
        <section class="screen">
          <div class="logo-wrap">
            <div class="logo">MAFIA</div>
            <div class="suits">♠ &nbsp; ♥ &nbsp; ♦ &nbsp; ♣</div>
            <div class="kicker">One phone. Closed eyes. Bad alibis.</div>
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("users")} Players</div>
            <div class="input-row">
              <input class="name-input" id="player-name-field" value="${esc(state.currentName)}" maxlength="22" autocomplete="off" autocorrect="off" autocapitalize="words" placeholder="Player name">
              <button class="btn btn-gold" data-action="add-player">${icon("plus")} Add</button>
            </div>
            <div style="height:12px"></div>
            ${players}
          </div>
          <div class="panel glass">
            <div class="section-label">${icon("cards")} Roles</div>
            <div class="config-list">
              ${renderStepper("killers", "Killers", "Mafia", 1, 10)}
              ${renderStepper("torturers", "Torturers", "Mafia", 0, 8)}
              ${renderStepper("doctors", "Doctors", "Town", 0, 6)}
              ${renderStepper("detectives", "Detectives", "Town", 0, 6)}
              ${renderToggle("whore", "Whore", "Neutral")}
              ${renderToggle("joker", "Joker", "Neutral")}
            </div>
          </div>
          <div class="validation ${v.level}">${icon(v.level === "ok" ? "check" : "info")} <span>${esc(v.text)}</span></div>
          <button class="btn btn-primary btn-block" data-action="start-game" ${isValidSetup() ? "" : "disabled"}>${icon("cards")} Deal Cards &rarr;</button>
        </section>`;
    }

    function renderSetupPlayer(player, index) {
      return `
        <div class="person-row glass-lite" style="--i:${index}">
          <div class="row-num">${index + 1}</div>
          <div class="player-name">${esc(player.name)}</div>
          <button class="btn btn-ghost btn-icon" aria-label="Remove ${esc(player.name)}" data-action="remove-player" data-id="${player.id}">${icon("x")}</button>
        </div>`;
    }

    function renderStepper(key, label, team, min, max) {
      const value = state.config[key];
      return `
        <div class="config-row">
          <div>
            <div class="config-name">${label}</div>
            <div class="config-meta">${team} - ${min} to ${max}</div>
          </div>
          <div class="stepper">
            <button data-action="config-step" data-key="${key}" data-delta="-1" ${value <= min ? "disabled" : ""} aria-label="Decrease ${label}">${icon("minus")}</button>
            <div class="stepper-value">${value}</div>
            <button data-action="config-step" data-key="${key}" data-delta="1" ${value >= max ? "disabled" : ""} aria-label="Increase ${label}">${icon("plus")}</button>
          </div>
        </div>`;
    }

    function renderToggle(key, label, team) {
      const on = state.config[key];
      return `
        <button class="config-row" data-action="config-toggle" data-key="${key}" aria-pressed="${on}">
          <div style="text-align:left">
            <div class="config-name">${label}</div>
            <div class="config-meta">${team} - optional role</div>
          </div>
          <span class="toggle ${on ? "on" : ""}"><span></span></span>
        </button>`;
    }

    function renderReveal() {
      const player = state.players[state.revealIndex];
      if (!player) return "";
      const role = ROLE[player.role];
      const last = state.revealIndex === state.players.length - 1;
      const nextName = last ? "Narrator" : state.players[state.revealIndex + 1].name;
      return `
        <section class="screen reveal-screen">
          <div>
            <div class="reveal-count">${state.revealIndex + 1} of ${state.players.length}</div>
            <div class="reveal-name">${esc(player.name)}</div>
          </div>
          <button class="card-scene" data-action="flip-card" aria-label="Reveal card for ${esc(player.name)}">
            <div class="playing-card ${state.cardFlipped ? "flipped" : ""}">
              <div class="card-face card-back">
                <div class="card-back-mark">MAFIA</div>
              </div>
              ${renderPlayingCard(role)}
            </div>
          </button>
          <div>
            <div class="reveal-hint">${state.cardFlipped ? `Memorize the role, then pass the phone face-down.` : `Only ${esc(player.name)} should look at this screen.`}</div>
            ${state.cardFlipped ? `<div style="height:12px"></div><button class="btn btn-primary btn-block" data-action="next-reveal">${last ? "Hand to Narrator" : `Pass to ${esc(nextName)}`} &rarr;</button>` : ""}
          </div>
        </section>`;
    }

    function renderPlayingCard(role) {
      const teamClass = role.team === "mafia" ? "mafia" : role.team === "neutral" ? "neutral" : "";
      const pipClass = role.color === "red" ? "red-pip" : role.color === "gold" ? "gold-pip" : "black-pip";
      return `
        <div class="card-face card-front ${teamClass}">
          <div class="card-corner ${pipClass}">${role.value}<br>${role.suit}</div>
          <div class="card-corner br ${pipClass}">${role.value}<br>${role.suit}</div>
          <div class="card-center">
            <div>
              <div class="card-value">${role.value}</div>
              <div class="card-suit ${pipClass}">${role.suit}</div>
              <div class="card-role">${role.label}</div>
            </div>
          </div>
        </div>`;
    }

    function renderHeader(phaseLabel, iconName, sub) {
      return `
        <header class="header glass">
          <div class="header-top">
            <div>
              <div class="title">Round ${state.round}</div>
              <div class="subtitle">${sub}</div>
            </div>
            <div class="phase-pill">${icon(iconName)} ${phaseLabel}</div>
          </div>
          ${state.phase === "night" ? `<div class="progress-dots">${state.night.steps.map((_, i) => `<span class="dot ${i < state.night.index ? "done" : i === state.night.index ? "active" : ""}"></span>`).join("")}</div>` : ""}
        </header>`;
    }

    function renderDay() {
      const live = alive();
      const dead = state.players.filter((p) => !p.alive);
      return `
        <section class="screen">
          ${renderHeader("Day", "sun", `${live.length} alive - tap a player to eliminate`)}
          <div class="panel glass">
            <div class="section-label">${icon("users")} Alive</div>
            ${live.map((p, i) => renderPlayerRow(p, { index: i, action: "open-eliminate" })).join("")}
            ${dead.length ? `<div class="boneyard"><div class="section-label">${icon("skull")} Boneyard</div>${dead.map((p, i) => renderPlayerRow(p, { index: i, dead: true })).join("")}</div>` : ""}
          </div>
          ${renderFab()}
          <div class="bottom-actions">
            <div class="bottom-inner">
              <button class="btn btn-ghost" data-action="skip-vote">Skip Vote</button>
              <button class="btn btn-primary" data-action="start-night">${icon("moon")} Begin Night</button>
            </div>
          </div>
        </section>`;
    }

    function renderPlayerRow(player, opts = {}) {
      const role = ROLE[player.role || "civilian"];
      const badges = [];
      if (!player.canTalk) badges.push(`<span class="badge gold">${icon("mouth")} Muted</span>`);
      if (!player.canVote) badges.push(`<span class="badge gold">${icon("hand")} No vote</span>`);
      if (player.promoted) badges.push(`<span class="badge red">${icon("crown")} Killer</span>`);
      if (!player.alive) badges.push(`<span class="badge">${icon("skull")} Dead</span>`);
      const selected = opts.selected ? "selected" : "";
      const dead = opts.dead || !player.alive ? "dead" : "";
      const action = opts.action ? `data-action="${opts.action}" data-id="${player.id}"` : "";
      return `
        <button class="game-row glass-lite ${selected} ${dead}" style="--i:${opts.index || 0}" ${action}>
          ${renderRolePip(role)}
          <div style="text-align:left; min-width:0">
            <div class="player-name">${esc(player.name)}</div>
            <div class="row-sub"><span>${role.label}</span>${badges.join("")}</div>
          </div>
          ${opts.selected ? `<div class="row-check">${icon("check")}</div>` : ""}
        </button>`;
    }

    function renderRolePip(role) {
      const team = role.team === "mafia" ? "mafia" : "";
      const color = role.color === "red" ? "red-pip" : role.color === "gold" ? "gold-pip" : "";
      return `<div class="role-pip ${team} ${color}"><span>${role.value}</span><span class="pip-suit">${role.suit}</span></div>`;
    }

    function renderFab() {
      if (state.screen === "setup" || state.screen === "reveal") return "";
      return `<button class="fab glass" data-action="open-narrator" aria-label="Open narrator panel">${icon("panel")}</button>`;
    }

    function renderNight() {
      const step = state.night.steps[state.night.index];
      if (!step) return "";
      return `
        <section class="screen">
          ${renderHeader("Night", "moon", `Step ${state.night.index + 1} of ${state.night.steps.length}`)}
          ${renderNightStep(step)}
          ${renderFab()}
        </section>`;
    }

    function renderNightStep(stepId) {
      const meta = STEP_META[stepId];
      const suggestion = state.night.actions.jokerSuggestion ? byId(state.night.actions.jokerSuggestion) : null;
      const suggestionHint = suggestion && stepId !== "joker" ? `<div class="hint">${icon("mask")} Joker suggested ${esc(suggestion.name)}.</div>` : "";
      return `
        <div class="step-card glass" style="--glow:${meta.glow}">
          <div class="section-label">${icon(meta.icon)} Night action</div>
          <div class="step-title">${meta.title}</div>
          <div class="step-copy">${stepIntro(stepId)}</div>
          <div class="script-box">${meta.script}</div>
        </div>
        ${suggestionHint}
        ${stepBody(stepId)}
        <div class="bottom-actions">
          <div class="bottom-inner">
            <button class="btn btn-ghost" data-action="skip-step">Skip</button>
            <button class="btn btn-primary" data-action="next-step">${stepId === "detective" ? "Finish Night" : "Next"} &rarr;</button>
          </div>
        </div>`;
    }

    function stepIntro(stepId) {
      const a = state.night.actions;
      if (stepId === "kill") {
        const killers = state.players.filter((p) => p.alive && activeKillerIds().includes(p.id));
        return `${killers.map((p) => esc(p.name)).join(", ")} choose one shared target.`;
      }
      if (stepId === "torturer") return "Mouth blocks speech. Hands blocks voting. Self-targets and Mafia targets are valid.";
      if (stepId === "doctor") {
        const actor = getDoctorActor();
        return state.round === 1 ? `${esc(actor ? actor.name : "Doctor")} cannot self-save in round 1.` : "Choose one player to protect.";
      }
      if (stepId === "detective" && a.detectiveCheck) {
        const target = byId(a.detectiveCheck);
        if (target) return `${esc(target.name)} is ready for a private narrator result.`;
      }
      return STEP_META[stepId].script;
    }

    function stepBody(stepId) {
      if (stepId === "joker") return stepJoker();
      if (stepId === "kill") return stepKill();
      if (stepId === "torturer") return stepTorturer();
      if (stepId === "whore") return stepWhore();
      if (stepId === "doctor") return stepDoctor();
      if (stepId === "detective") return stepDetective();
      return "";
    }

    function nightTargetList(players, selectedId) {
      return `<div class="player-list">${players.map((p, i) => renderPlayerRow(p, { index: i, action: "night-pick", selected: p.id === selectedId })).join("")}</div>`;
    }

    function stepJoker() {
      const a = state.night.actions;
      const targets = alive().filter((p) => p.role !== "joker");
      return `
        <div class="action-grid">
          <button class="action-tile ${a.jokerAwake ? "selected" : ""}" data-action="toggle-joker" data-mode="awake">${icon("eye")}<div class="action-title">Woke up</div><div class="action-sub">Point to a target</div></button>
          <button class="action-tile ${!a.jokerAwake ? "selected" : ""}" data-action="toggle-joker" data-mode="sleep">${icon("sleep")}<div class="action-title">Sleeping</div><div class="action-sub">No suggestion</div></button>
        </div>
        ${a.jokerAwake ? `<div class="section-label">${icon("mask")} Suggested target</div>${nightTargetList(targets, a.jokerSuggestion)}` : ""}`;
    }

    function stepKill() {
      const killerSet = new Set(activeKillerIds());
      const targets = alive().filter((p) => !killerSet.has(p.id));
      return `<div class="section-label">${icon("blade")} Shared kill target</div>${nightTargetList(targets, state.night.actions.killTarget)}`;
    }

    function stepTorturer() {
      const a = state.night.actions;
      return `
        <div class="action-grid">
          <button class="action-tile ${a.tortureMode === "mouth" ? "selected" : ""}" data-action="torture-mode" data-mode="mouth">${icon("mouth")}<div class="action-title">Mouth</div><div class="action-sub">Cannot speak today</div></button>
          <button class="action-tile ${a.tortureMode === "hands" ? "selected" : ""}" data-action="torture-mode" data-mode="hands">${icon("hand")}<div class="action-title">Hands</div><div class="action-sub">Cannot vote today</div></button>
        </div>
        ${a.tortureMode ? `<div class="section-label">${icon("bind")} Target</div>${nightTargetList(torturerTargets(), a.tortureTarget)}` : ""}`;
    }

    function stepWhore() {
      const targets = alive().filter((p) => p.role !== "whore");
      return `<div class="section-label">${icon("heart")} Bed partner</div>${nightTargetList(targets, state.night.actions.whoreTarget)}`;
    }

    function stepDoctor() {
      const doctors = aliveRole("doctor");
      const actor = getDoctorActor();
      const actorChooser = doctors.length > 1 && state.round === 1
        ? `<div class="section-label">${icon("shield")} Acting Doctor</div><div class="player-list">${doctors.map((p, i) => renderPlayerRow(p, { index: i, action: "doctor-actor", selected: actor && p.id === actor.id })).join("")}</div>`
        : "";
      return `${actorChooser}<div class="section-label">${icon("shield")} Protected player</div>${nightTargetList(doctorTargets(actor ? actor.id : null), state.night.actions.doctorSave)}`;
    }

    function stepDetective() {
      const a = state.night.actions;
      const detectives = aliveRole("detective");
      const targets = alive().filter((p) => p.role !== "detective");
      const target = a.detectiveCheck ? byId(a.detectiveCheck) : null;
      const result = target ? detectiveResult(target, detectives[0]) : "";
      return `${result}<div class="section-label">${icon("search")} Suspect</div>${nightTargetList(targets, a.detectiveCheck)}`;
    }

    function detectiveResult(target, detective) {
      const mafia = target.role === "killer" || target.role === "torturer";
      return `
        <div class="result-card ${mafia ? "bad" : "good"}">
          ${icon(mafia ? "thumbDown" : "thumbUp")}
          <div>${mafia ? "MAFIA" : "NOT MAFIA"} - show ${mafia ? "thumbs down" : "thumbs up"} privately${detective ? ` to ${esc(detective.name)}` : ""}.</div>
        </div>`;
    }

    function renderDawn() {
      return `
        <section class="screen">
          ${renderHeader("Dawn", "sun", "Narrator announces what happened")}
          <div class="panel glass">
            <div class="section-label">${icon("log")} Night report</div>
            <div class="event-list">
              ${state.events.map((event, i) => renderEvent(event, i)).join("")}
            </div>
          </div>
          ${renderFab()}
          <div class="bottom-actions">
            <div class="bottom-inner single">
              <button class="btn btn-primary" data-action="begin-day">${icon("sun")} Begin Day ${state.round + 1}</button>
            </div>
          </div>
        </section>`;
    }

    function renderEvent(event, index) {
      return `
        <div class="event-row glass-lite ${event.kind}" style="--i:${index}">
          <div class="event-icon">${icon(event.icon)}</div>
          <div>
            <div class="event-title">${esc(event.title)}</div>
            <div class="event-msg">${esc(event.message)}</div>
          </div>
        </div>`;
    }

    function renderGameOver() {
      const town = state.result === "town";
      return `
        <section class="screen">
          <div class="winner-mark">${icon(town ? "shield" : "blade")}</div>
          <div class="winner-title">${town ? "Town Wins" : "Mafia Wins"}</div>
          <div class="winner-copy">${town ? "All Killers and Torturers are gone. The town survives the table." : "The Mafia now equals or outnumbers the Town. Control is gone."}</div>
          ${TEAM_ORDER.filter((team) => state.players.some((p) => team.roles.includes(p.role))).map(renderTeamSection).join("")}
          <button class="btn btn-primary btn-block" data-action="new-game">${icon("cards")} New Game</button>
        </section>`;
    }

    function renderTeamSection(team) {
      const members = state.players.filter((p) => team.roles.includes(p.role));
      return `
        <div class="team-section panel glass">
          <div class="section-label">${team.label}</div>
          ${members.map((p, i) => renderPlayerRow(p, { index: i, dead: !p.alive })).join("")}
        </div>`;
    }

    function renderModal() {
      if (!state.modal) return "";
      if (state.modal.type === "eliminate") return renderEliminateModal();
      if (state.modal.type === "narrator") return renderNarratorModal();
      return "";
    }

    function renderEliminateModal() {
      const player = byId(state.modal.id);
      if (!player) return "";
      return `
        <div class="overlay" data-action="modal-backdrop">
          <div class="sheet glass" data-sheet>
            <div class="sheet-handle"></div>
            <div class="sheet-title">Eliminate ${esc(player.name)}?</div>
            <p class="muted">Their role will be visible in the boneyard. You will have five seconds to undo.</p>
            <div class="modal-actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-danger" data-action="confirm-eliminate" data-id="${player.id}">${icon("skull")} Eliminate</button>
            </div>
          </div>
        </div>`;
    }

    function renderNarratorModal() {
      const counts = liveCounts();
      const body = state.narratorTab === "roles" ? renderNarratorRoles() : renderNightLog();
      return `
        <div class="overlay" data-action="modal-backdrop">
          <div class="sheet glass" data-sheet>
            <div class="sheet-handle"></div>
            <div class="sheet-title">Narrator Panel</div>
            <div class="count-grid">
              <div class="count-box"><div class="count-num">${counts.mafia}</div><div class="count-label">Mafia</div></div>
              <div class="count-box"><div class="count-num">${counts.town}</div><div class="count-label">Town</div></div>
              <div class="count-box"><div class="count-num">${counts.alive}</div><div class="count-label">Alive</div></div>
            </div>
            <div class="tabs">
              <button class="tab ${state.narratorTab === "roles" ? "active" : ""}" data-action="narrator-tab" data-tab="roles">Roles</button>
              <button class="tab ${state.narratorTab === "log" ? "active" : ""}" data-action="narrator-tab" data-tab="log">Night Log</button>
            </div>
            <div class="sheet-body">${body}</div>
            <button class="btn btn-ghost btn-block" data-action="close-modal">${icon("x")} Close</button>
          </div>
        </div>`;
    }

    function renderNarratorRoles() {
      return state.players.map((player, i) => {
        const controls = player.alive ? `
          <div class="row-sub">
            <button class="badge ${player.canTalk ? "" : "gold"}" data-action="toggle-talk" data-id="${player.id}">${icon("mouth")} ${player.canTalk ? "Can talk" : "Muted"}</button>
            <button class="badge ${player.canVote ? "" : "gold"}" data-action="toggle-vote" data-id="${player.id}">${icon("hand")} ${player.canVote ? "Can vote" : "No vote"}</button>
          </div>` : "";
        return `<div>${renderPlayerRow(player, { index: i, dead: !player.alive })}${controls}</div>`;
      }).join("");
    }

    function renderNightLog() {
      if (!state.history.length) return `<div class="event-row glass-lite info">${icon("info")}<div><div class="event-title">No night log yet</div><div class="event-msg">Night events will appear here after the first dawn.</div></div></div>`;
      return state.history.slice().reverse().map((round) => `
        <div class="panel glass-lite">
          <div class="section-label">Round ${round.round}</div>
          ${round.events.map((event, i) => renderEvent(event, i)).join("")}
        </div>`).join("");
    }

    function renderToast() {
      if (!state.undo) return "";
      const player = byId(state.undo.playerId);
      return `
        <div class="undo glass">
          <div>
            <div class="undo-text">${esc(player ? player.name : "Player")} eliminated</div>
            <div class="undo-sub">Undo available for five seconds.</div>
          </div>
          <button class="btn btn-gold" data-action="undo-eliminate">Undo</button>
          <div class="undo-progress"></div>
        </div>`;
    }

    function liveCounts(players = state.players) {
      const live = alive(players);
      return {
        alive: live.length,
        mafia: live.filter((p) => p.role === "killer" || p.role === "torturer").length,
        town: live.filter((p) => ["civilian", "detective", "doctor"].includes(p.role)).length,
        neutral: live.filter((p) => ["whore", "joker"].includes(p.role)).length
      };
    }

    function addPlayer() {
      const field = document.getElementById("player-name-field");
      const name = (field ? field.value : state.currentName).trim();
      if (!name) return;
      state.players.push({ id: uid(), name, role: null, alive: true, canTalk: true, canVote: true, promoted: false });
      state.currentName = "";
      pulse("tap");
      scheduleRender();
      requestAnimationFrame(() => {
        const next = document.getElementById("player-name-field");
        if (next) next.focus();
      });
    }

    function setConfigStep(key, delta) {
      const limits = { killers: [1, 10], torturers: [0, 8], doctors: [0, 6], detectives: [0, 6] };
      const [min, max] = limits[key] || [0, 10];
      state.config[key] = Math.max(min, Math.min(max, state.config[key] + delta));
      pulse("tap");
      scheduleRender();
    }

    function startGame() {
      if (!isValidSetup()) return;
      clearUndo();
      const deck = [];
      for (let i = 0; i < state.config.killers; i++) deck.push("killer");
      for (let i = 0; i < state.config.torturers; i++) deck.push("torturer");
      for (let i = 0; i < state.config.doctors; i++) deck.push("doctor");
      for (let i = 0; i < state.config.detectives; i++) deck.push("detective");
      if (state.config.whore) deck.push("whore");
      if (state.config.joker) deck.push("joker");
      while (deck.length < state.players.length) deck.push("civilian");
      shuffle(deck);
      state.players.forEach((p, i) => {
        p.role = deck[i];
        p.alive = true;
        p.canTalk = true;
        p.canVote = true;
        p.promoted = false;
      });
      state.revealIndex = 0;
      state.cardFlipped = false;
      state.round = 1;
      state.torturerPromoted = false;
      state.events = [];
      state.history = [];
      state.result = null;
      wantsWakeLock = true;
      acquireWakeLock();
      pulse("tap");
      navigate("reveal", "reveal");
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [items[i], items[j]] = [items[j], items[i]];
      }
    }

    function randomInt(max) {
      if (window.crypto && crypto.getRandomValues) {
        const values = new Uint32Array(1);
        crypto.getRandomValues(values);
        return values[0] % max;
      }
      return Math.floor(Math.random() * max);
    }

    function flipCard() {
      if (state.cardFlipped) return;
      state.cardFlipped = true;
      pulse("flip");
      scheduleRender();
    }

    function nextReveal() {
      state.revealIndex += 1;
      state.cardFlipped = false;
      if (state.revealIndex >= state.players.length) {
        navigate("game", "day");
      } else {
        pulse("tap");
        scheduleRender(true);
      }
    }

    function startNight() {
      clearUndo();
      state.players.forEach((p) => {
        if (p.alive) {
          p.canTalk = true;
          p.canVote = true;
        }
      });
      state.night.actions = emptyActions();
      state.night.steps = buildNightSteps();
      state.night.index = 0;
      if (!state.night.steps.length) {
        resolveNight();
        return;
      }
      pulse("night");
      vibrate([10, 50, 10]);
      navigate("game", "night");
    }

    function buildNightSteps(players = state.players) {
      const steps = [];
      if (aliveRole("joker", players).length) steps.push("joker");
      if (activeKillerIds(players).length) steps.push("kill");
      if (aliveRole("torturer", players).some((p) => !p.promoted) && !state.torturerPromoted) steps.push("torturer");
      if (aliveRole("whore", players).length) steps.push("whore");
      if (aliveRole("doctor", players).length) steps.push("doctor");
      if (aliveRole("detective", players).length) steps.push("detective");
      return steps;
    }

    function currentStep() {
      return state.night.steps[state.night.index] || null;
    }

    function pickNightTarget(id) {
      const step = currentStep();
      const a = state.night.actions;
      if (step === "joker" && a.jokerAwake) a.jokerSuggestion = a.jokerSuggestion === id ? null : id;
      if (step === "kill") a.killTarget = a.killTarget === id ? null : id;
      if (step === "torturer" && a.tortureMode) a.tortureTarget = a.tortureTarget === id ? null : id;
      if (step === "whore") a.whoreTarget = a.whoreTarget === id ? null : id;
      if (step === "doctor") a.doctorSave = a.doctorSave === id ? null : id;
      if (step === "detective") a.detectiveCheck = a.detectiveCheck === id ? null : id;
      pulse("tap");
      scheduleRender();
    }

    function nextStep() {
      state.night.index += 1;
      if (state.night.index >= state.night.steps.length) {
        resolveNight();
      } else {
        pulse("tap");
        scheduleRender(true);
      }
    }

    function skipStep() {
      const step = currentStep();
      const a = state.night.actions;
      if (step === "joker") { a.jokerAwake = false; a.jokerSuggestion = null; }
      if (step === "kill") a.killTarget = null;
      if (step === "torturer") { a.tortureMode = null; a.tortureTarget = null; }
      if (step === "whore") a.whoreTarget = null;
      if (step === "doctor") { a.doctorSave = null; a.doctorActor = null; }
      if (step === "detective") a.detectiveCheck = null;
      nextStep();
    }

    function resolveNight() {
      const outcome = resolveNightCore(state.players, state.night.actions, {
        round: state.round,
        torturerPromoted: state.torturerPromoted
      });
      state.torturerPromoted = outcome.torturerPromoted;
      state.events = outcome.events.length ? outcome.events : [{ kind: "info", icon: "moon", title: "Quiet night", message: "No public result was announced." }];
      state.history.push({ round: state.round, events: state.events.map((e) => ({ ...e })) });
      const winner = getWinner(state.players);
      if (winner) {
        finishGame(winner);
        return;
      }
      navigate("game", "dawn");
    }

    function resolveNightCore(players, actions, context) {
      const events = [];
      const killerIds = activeKillerIds(players);
      const whore = players.find((p) => p.alive && p.role === "whore") || null;
      const savedId = actions.doctorSave || null;
      const whoreTargetId = actions.whoreTarget || null;
      const killTargetId = actions.killTarget || null;
      const sleptWithActiveKiller = Boolean(whore && whoreTargetId && killerIds.includes(whoreTargetId));

      if (killTargetId && sleptWithActiveKiller) {
        events.push({ kind: "info", icon: "heart", title: "No kill tonight", message: "The Whore slept with an active Killer. The Mafia kill fails." });
      } else if (killTargetId) {
        const target = byId(killTargetId, players);
        const whoreIsTarget = Boolean(whore && killTargetId === whore.id);
        const partnerIsTarget = Boolean(whore && whoreTargetId && killTargetId === whoreTargetId && !whoreIsTarget);

        if (whoreIsTarget) {
          if (savedId === whore.id) {
            events.push({ kind: "save", icon: "shield", title: `${whore.name} was saved`, message: "Doctor saved the Whore. Her partner also lives." });
          } else {
            killPlayer(whore.id, players);
            events.push({ kind: "death", icon: "skull", title: `${whore.name} died`, message: "Eliminated by the Mafia" });
            const partner = whoreTargetId ? byId(whoreTargetId, players) : null;
            if (partner && partner.alive) {
              if (savedId === partner.id) {
                events.push({ kind: "save", icon: "shield", title: `${partner.name} was saved`, message: "Doctor saved the Whore's partner." });
              } else {
                killPlayer(partner.id, players);
                events.push({ kind: "death", icon: "skull", title: `${partner.name} died`, message: "Shares the fate of the Whore" });
              }
            }
          }
        } else if (partnerIsTarget) {
          const partner = target;
          if (partner && savedId === partner.id) {
            events.push({ kind: "save", icon: "shield", title: `${partner.name} was saved`, message: "Doctor saved the Whore's partner. The Whore also lives." });
          } else {
            if (partner) {
              killPlayer(partner.id, players);
              events.push({ kind: "death", icon: "skull", title: `${partner.name} died`, message: "Eliminated by the Mafia" });
            }
            if (whore && whore.alive) {
              if (savedId === whore.id) {
                events.push({ kind: "save", icon: "shield", title: `${whore.name} was saved`, message: "Doctor saved the Whore from sharing her partner's fate." });
              } else {
                killPlayer(whore.id, players);
                events.push({ kind: "death", icon: "skull", title: `${whore.name} died`, message: "The Whore shares the fate of her partner" });
              }
            }
          }
        } else if (target) {
          if (savedId === target.id) {
            events.push({ kind: "save", icon: "shield", title: `${target.name} was saved`, message: "Doctor protected the Mafia target." });
          } else {
            killPlayer(target.id, players);
            events.push({ kind: "death", icon: "skull", title: `${target.name} died`, message: "Eliminated by the Mafia" });
          }
        }
      } else {
        events.push({ kind: "info", icon: "moon", title: "No kill", message: "The Mafia did not choose a victim." });
      }

      if (actions.tortureTarget && actions.tortureMode && !context.torturerPromoted) {
        const target = byId(actions.tortureTarget, players);
        if (target && target.alive) {
          if (actions.tortureMode === "mouth") {
            target.canTalk = false;
            events.push({ kind: "torture", icon: "mouth", title: `${target.name} is silenced`, message: `${target.name} cannot speak during the next day.` });
          } else {
            target.canVote = false;
            events.push({ kind: "torture", icon: "hand", title: `${target.name} is restrained`, message: `${target.name} cannot vote during the next day.` });
          }
        }
      }

      if (actions.detectiveCheck) {
        const target = byId(actions.detectiveCheck, players);
        if (target) {
          const mafia = target.role === "killer" || target.role === "torturer";
          events.push({ kind: mafia ? "death" : "info", icon: mafia ? "thumbDown" : "thumbUp", title: `${target.name}: ${mafia ? "MAFIA" : "NOT MAFIA"}`, message: mafia ? "Show thumbs down to the Detective." : "Show thumbs up to the Detective." });
        }
      }

      const promotion = applyPromotion(players, context.torturerPromoted);
      if (promotion.promoted.length) {
        events.push({ kind: "info", icon: "crown", title: "Succession", message: `${promotion.promoted.map((p) => p.name).join(", ")} becomes the active Killer.` });
      }

      return { events, torturerPromoted: promotion.torturerPromoted };
    }

    function killPlayer(id, players = state.players) {
      const player = byId(id, players);
      if (player) player.alive = false;
    }

    function applyPromotion(players = state.players, alreadyPromoted = state.torturerPromoted) {
      if (alreadyPromoted) return { promoted: [], torturerPromoted: true };
      const livingKillers = players.filter((p) => p.alive && p.role === "killer");
      const torturers = players.filter((p) => p.alive && p.role === "torturer" && !p.promoted);
      if (livingKillers.length === 0 && torturers.length > 0) {
        torturers.forEach((p) => { p.promoted = true; });
        return { promoted: torturers, torturerPromoted: true };
      }
      return { promoted: [], torturerPromoted: alreadyPromoted };
    }

    function getWinner(players = state.players) {
      const counts = liveCounts(players);
      if (counts.mafia === 0) return "town";
      if (counts.mafia >= counts.town) return "mafia";
      return null;
    }

    function finishGame(result, options = {}) {
      state.result = result;
      if (!options.preserveUndo) clearUndo();
      wantsWakeLock = false;
      releaseWakeLock();
      pulse(result === "town" ? "townWin" : "mafiaWin");
      navigate("gameover", "over");
    }

    function beginDay() {
      state.round += 1;
      navigate("game", "day");
    }

    function openEliminate(id) {
      const player = byId(id);
      if (!player || !player.alive) return;
      state.modal = { type: "eliminate", id };
      pulse("tap");
      scheduleRender();
    }

    function confirmEliminate(id) {
      const player = byId(id);
      if (!player || !player.alive) return;
      const beforePromoted = state.torturerPromoted;
      player.alive = false;
      const promotion = applyPromotion(state.players, state.torturerPromoted);
      state.torturerPromoted = promotion.torturerPromoted;
      state.undo = {
        playerId: player.id,
        role: player.role,
        promotedIds: promotion.promoted.map((p) => p.id),
        torturerPromotedBefore: beforePromoted
      };
      state.modal = null;
      startUndoTimer();
      vibrate(15);
      pulse("kill");
      const winner = getWinner();
      if (winner) {
        finishGame(winner, { preserveUndo: true });
        return;
      }
      scheduleRender();
    }

    function undoEliminate() {
      if (!state.undo) return;
      const undo = state.undo;
      const player = byId(undo.playerId);
      if (player) player.alive = true;
      if (undo.role === "killer" && undo.promotedIds.length) {
        undo.promotedIds.forEach((id) => {
          const promoted = byId(id);
          if (promoted) promoted.promoted = false;
        });
        state.torturerPromoted = undo.torturerPromotedBefore;
      }
      clearUndo();
      state.result = null;
      wantsWakeLock = true;
      acquireWakeLock();
      pulse("tap");
      navigate("game", "day");
    }

    function startUndoTimer() {
      window.clearTimeout(undoTimer);
      undoTimer = window.setTimeout(() => {
        state.undo = null;
        scheduleRender();
      }, 5000);
    }

    function clearUndo() {
      window.clearTimeout(undoTimer);
      undoTimer = 0;
      state.undo = null;
    }

    function getDoctorActor() {
      const doctors = aliveRole("doctor");
      if (!doctors.length) return null;
      const selected = state.night.actions.doctorActor ? byId(state.night.actions.doctorActor) : null;
      if (selected && selected.alive && selected.role === "doctor") return selected;
      state.night.actions.doctorActor = doctors[0].id;
      return doctors[0];
    }

    function doctorTargets(actorId, players = state.players, round = state.round) {
      return alive(players).filter((p) => !(round === 1 && actorId && p.id === actorId));
    }

    function torturerTargets(players = state.players) {
      return alive(players);
    }

    function resetGame() {
      clearUndo();
      const preservedPlayers = state.players.map((p) => ({
        id: uid(),
        name: p.name,
        role: null,
        alive: true,
        canTalk: true,
        canVote: true,
        promoted: false
      }));
      state.players = preservedPlayers;
      state.revealIndex = 0;
      state.cardFlipped = false;
      state.round = 1;
      state.phase = "setup";
      state.torturerPromoted = false;
      state.night = { steps: [], index: 0, actions: emptyActions() };
      state.events = [];
      state.history = [];
      state.result = null;
      state.modal = null;
      wantsWakeLock = false;
      releaseWakeLock();
      navigate("setup", "setup");
    }

    function clonePlayers(list) {
      return list.map((p) => ({ ...p }));
    }

    async function ensureAudio() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") await audioCtx.resume();
      return audioCtx;
    }

    async function tone(freqA, freqB, duration, type, gainValue) {
      const ctx = await ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freqA, ctx.currentTime);
      if (freqB) osc.frequency.exponentialRampToValueAtTime(freqB, ctx.currentTime + duration);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(gainValue || 0.08, ctx.currentTime + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration + 0.02);
    }

    function chord(notes, duration, type, gain) {
      notes.forEach((note, i) => window.setTimeout(() => { tone(note[0], note[1], duration, type, gain); }, i * 80));
    }

    function pulse(kind) {
      vibrate(8);
      if (kind === "flip") { tone(700, 180, .09, "sine", .09); return; }
      if (kind === "night") { chord([[392, 330], [330, 262], [262, 196]], .62, "sine", .055); return; }
      if (kind === "kill") { chord([[110, 82], [147, 110], [185, 130]], .55, "sawtooth", .045); return; }
      if (kind === "townWin") { chord([[262, 330], [330, 392], [392, 523], [523, 659]], .34, "sine", .06); return; }
      if (kind === "mafiaWin") { chord([[220, 165], [185, 130], [147, 98]], .55, "sawtooth", .05); return; }
      tone(440, 660, .05, "sine", .045);
    }

    function vibrate(pattern) {
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    async function acquireWakeLock() {
      if (!("wakeLock" in navigator) || !wantsWakeLock || document.visibilityState !== "visible") return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
          if (wantsWakeLock && document.visibilityState === "visible") window.setTimeout(acquireWakeLock, 250);
        }, { once: true });
      } catch (_) {
        wakeLock = null;
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        const lock = wakeLock;
        wakeLock = null;
        lock.release().catch(() => {});
      }
    }

    function createStars() {
      const root = document.getElementById("stars");
      const stars = [];
      for (let i = 0; i < 130; i++) {
        const x = Math.round(Math.random() * 10000) / 100;
        const y = Math.round(Math.random() * 10000) / 100;
        const size = Math.round((Math.random() * 1.7 + .8) * 10) / 10;
        const duration = Math.round((Math.random() * 2600 + 1600));
        stars.push(`<span class="star" style="--x:${x}%;--y:${y}%;--s:${size}px;--d:${duration}ms"></span>`);
      }
      root.innerHTML = stars.join("");
    }

    function handleClick(event) {
      const actionable = event.target.closest("[data-action]");
      if (!actionable) return;
      const action = actionable.dataset.action;
      if (action === "modal-backdrop" && event.target !== actionable) return;
      if (action === "add-player") addPlayer();
      if (action === "remove-player") { state.players = state.players.filter((p) => p.id !== actionable.dataset.id); pulse("tap"); scheduleRender(); }
      if (action === "config-step") setConfigStep(actionable.dataset.key, Number(actionable.dataset.delta));
      if (action === "config-toggle") { state.config[actionable.dataset.key] = !state.config[actionable.dataset.key]; pulse("tap"); scheduleRender(); }
      if (action === "start-game") startGame();
      if (action === "flip-card") flipCard();
      if (action === "next-reveal") nextReveal();
      if (action === "open-eliminate") openEliminate(actionable.dataset.id);
      if (action === "confirm-eliminate") confirmEliminate(actionable.dataset.id);
      if (action === "undo-eliminate") undoEliminate();
      if (action === "skip-vote" || action === "start-night") startNight();
      if (action === "open-narrator") { state.modal = { type: "narrator" }; pulse("tap"); scheduleRender(); }
      if (action === "close-modal" || action === "modal-backdrop") { state.modal = null; pulse("tap"); scheduleRender(); }
      if (action === "narrator-tab") { state.narratorTab = actionable.dataset.tab; pulse("tap"); scheduleRender(); }
      if (action === "toggle-talk") { const p = byId(actionable.dataset.id); if (p) p.canTalk = !p.canTalk; pulse("tap"); scheduleRender(); }
      if (action === "toggle-vote") { const p = byId(actionable.dataset.id); if (p) p.canVote = !p.canVote; pulse("tap"); scheduleRender(); }
      if (action === "night-pick") pickNightTarget(actionable.dataset.id);
      if (action === "toggle-joker") { state.night.actions.jokerAwake = actionable.dataset.mode === "awake"; if (!state.night.actions.jokerAwake) state.night.actions.jokerSuggestion = null; pulse("tap"); scheduleRender(); }
      if (action === "torture-mode") { state.night.actions.tortureMode = state.night.actions.tortureMode === actionable.dataset.mode ? null : actionable.dataset.mode; state.night.actions.tortureTarget = null; pulse("tap"); scheduleRender(); }
      if (action === "doctor-actor") { state.night.actions.doctorActor = actionable.dataset.id; state.night.actions.doctorSave = null; pulse("tap"); scheduleRender(); }
      if (action === "next-step") nextStep();
      if (action === "skip-step") skipStep();
      if (action === "begin-day") beginDay();
      if (action === "new-game") resetGame();
    }

    function handleInput(event) {
      if (event.target && event.target.id === "player-name-field") state.currentName = event.target.value;
    }

    function handleKey(event) {
      if (event.key === "Enter" && event.target && event.target.id === "player-name-field") addPlayer();
      if (event.key === "Escape" && state.modal) { state.modal = null; scheduleRender(); }
    }

    function handlePointerDown(event) {
      const sheet = event.target.closest("[data-sheet]");
      if (!sheet) return;
      dragSheet = { sheet, startY: event.clientY, currentY: 0, pointerId: event.pointerId };
      sheet.setPointerCapture(event.pointerId);
    }

    function handlePointerMove(event) {
      if (!dragSheet || dragSheet.pointerId !== event.pointerId) return;
      const delta = Math.max(0, event.clientY - dragSheet.startY);
      dragSheet.currentY = delta;
      if (!dragRaf) {
        dragRaf = requestAnimationFrame(() => {
          dragRaf = 0;
          if (dragSheet) dragSheet.sheet.style.transform = `translate3d(0, ${dragSheet.currentY}px, 0)`;
        });
      }
    }

    function handlePointerUp(event) {
      if (!dragSheet || dragSheet.pointerId !== event.pointerId) return;
      const shouldClose = dragSheet.currentY > 90;
      dragSheet.sheet.style.transform = "";
      dragSheet = null;
      if (shouldClose) {
        state.modal = null;
        scheduleRender();
      }
    }

    function runLogicTests() {
      const make = (role, name) => ({ id: uid(), name: name || role, role, alive: true, canTalk: true, canVote: true, promoted: false });
      const assert = (ok, label) => { if (!ok) throw new Error(label); };

      let players = [make("killer", "K"), make("whore", "W"), make("doctor", "D"), make("civilian", "C")];
      let out = resolveNightCore(clonePlayers(players), { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[0].id, doctorSave: players[3].id }, { round: 1, torturerPromoted: false });
      assert(out.events.some((e) => e.title === "No kill tonight"), "Whore with active Killer blocks kill");

      players = [make("killer", "K"), make("whore", "W"), make("doctor", "D"), make("civilian", "P")];
      let sim = clonePlayers(players);
      resolveNightCore(sim, { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[3].id, doctorSave: players[3].id }, { round: 2, torturerPromoted: false });
      assert(sim.every((p) => p.alive), "Doctor saving partner keeps partner and Whore alive");

      sim = clonePlayers(players);
      resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id, doctorSave: players[1].id }, { round: 2, torturerPromoted: false });
      assert(sim.every((p) => p.alive), "Doctor saving Whore keeps Whore and partner alive");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id, doctorSave: players[3].id }, { round: 2, torturerPromoted: false });
      assert(!sim.find((p) => p.name === "W").alive && sim.find((p) => p.name === "P").alive, "Partner saved when Whore dies");
      assert(out.events.some((e) => e.message === "Eliminated by the Mafia"), "Mafia death message exact");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[3].id }, { round: 2, torturerPromoted: false });
      assert(!sim.find((p) => p.name === "W").alive && !sim.find((p) => p.name === "P").alive, "Partner death pulls Whore");
      assert(out.events.some((e) => e.message === "The Whore shares the fate of her partner"), "Whore fate message exact");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id }, { round: 2, torturerPromoted: false });
      assert(out.events.some((e) => e.message === "Shares the fate of the Whore"), "Partner fate message exact");

      const docA = make("doctor", "A");
      const docB = make("doctor", "B");
      const civ = make("civilian", "C");
      assert(doctorTargets(docA.id, [docA, docB, civ], 1).some((p) => p.id === docB.id), "Doctor A can save Doctor B in round 1");
      assert(!doctorTargets(docA.id, [docA, docB, civ], 1).some((p) => p.id === docA.id), "Doctor A cannot self-save in round 1");

      players = [make("killer", "K"), make("torturer", "T"), make("civilian", "C")];
      players[0].alive = false;
      const promo = applyPromotion(players, false);
      assert(promo.promoted.length === 1 && players[1].promoted, "Torturer promotion triggers when last Killer dies");
      assert(torturerTargets(players).some((p) => p.role === "torturer"), "Torturer can target self");
      assert(getWinner([make("killer", "K"), make("civilian", "C")]) === "mafia", "Mafia parity win");
      assert(getWinner([make("civilian", "C")]) === "town", "Town wins when Mafia gone");
      return true;
    }

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
    document.addEventListener("keydown", handleKey);
    document.addEventListener("touchstart", () => {}, { passive: true });
    document.addEventListener("touchmove", () => {}, { passive: true });
    document.addEventListener("pointerdown", handlePointerDown);
    document.addEventListener("pointermove", handlePointerMove);
    document.addEventListener("pointerup", handlePointerUp);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && wantsWakeLock) acquireWakeLock();
    });

    window.MAFIA_DEV = {
      state,
      runLogicTests,
      resolveNightCore,
      getWinner,
      doctorTargets,
      torturerTargets
    };

    createStars();
    scheduleRender(true);
  </script>
</body>
