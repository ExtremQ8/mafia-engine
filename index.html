    function renderNightLog() {
      if (!state.history.length) return `<div class="event-row glass-lite info">${icon("info")}<div><div class="event-title">No night log yet</div><div class="event-msg">Night events will appear here after the first dawn.</div></div></div>`;
      return state.history.slice().reverse().map((round) => `
        <div class="panel glass-lite">
          <div class="section-label">Round ${round.round}</div>
          ${round.events.map((event, i) => renderEvent(event, i)).join("")}
        </div>`).join("");
    }

    function renderToast() {
      if (!state.undo) return "";
      const player = byId(state.undo.playerId);
      return `
        <div class="undo glass">
          <div>
            <div class="undo-text">${esc(player ? player.name : "Player")} eliminated</div>
            <div class="undo-sub">Undo available for five seconds.</div>
          </div>
          <button class="btn btn-gold" data-action="undo-eliminate">Undo</button>
          <div class="undo-progress"></div>
        </div>`;
    }

    function liveCounts(players = state.players) {
      const live = alive(players);
      return {
        alive: live.length,
        mafia: live.filter((p) => p.role === "killer" || p.role === "torturer").length,
        town: live.filter((p) => ["civilian", "detective", "doctor"].includes(p.role)).length,
        neutral: live.filter((p) => ["whore", "joker"].includes(p.role)).length
      };
    }

    function addPlayer() {
      const field = document.getElementById("player-name-field");
      const name = normalizeName(field ? field.value : state.currentName);
      if (!name) {
        state.setupNotice = { level: "warn", text: "Type a player name first." };
        scheduleRender();
        return;
      }
      if (state.players.length >= 24) {
        state.setupNotice = { level: "err", text: "This table is full. Keep games to 24 players or fewer." };
        pulse("tap");
        scheduleRender();
        return;
      }
      if (state.players.some((player) => canonicalName(player.name) === canonicalName(name))) {
        state.setupNotice = { level: "err", text: `${name} is already seated.` };
        pulse("tap");
        scheduleRender();
        return;
      }
      state.players.push({ id: uid(), name, role: null, alive: true, canTalk: true, canVote: true, promoted: false });
      state.currentName = "";
      state.setupNotice = { level: "ok", text: `${name} joined the table.` };
      pulse("tap");
      scheduleRender();
      requestAnimationFrame(() => {
        const next = document.getElementById("player-name-field");
        if (next) next.focus();
      });
    }

    function setConfigStep(key, delta) {
      const limits = { killers: [1, 10], torturers: [0, 8], doctors: [0, 6], detectives: [0, 6] };
      const [min, max] = limits[key] || [0, 10];
      state.config[key] = Math.max(min, Math.min(max, state.config[key] + delta));
      state.preset = selectedPresetId();
      state.setupNotice = null;
      pulse("tap");
      scheduleRender();
    }

    function applyPreset(id) {
      const preset = PRESETS.find((item) => item.id === id);
      if (!preset) return;
      state.config = { ...preset.config };
      state.preset = preset.id;
      state.setupNotice = { level: "ok", text: `${preset.label} preset applied.` };
      pulse("tap");
      scheduleRender();
    }

    function quickSeats(count = 8) {
      if (state.players.length) {
        state.setupNotice = { level: "warn", text: "Quick seats only runs on an empty table." };
        scheduleRender();
        return;
      }
      state.players = Array.from({ length: count }, (_, index) => ({
        id: uid(),
        name: `Seat ${index + 1}`,
        role: null,
        alive: true,
        canTalk: true,
        canVote: true,
        promoted: false
      }));
      state.config = recommendedConfigForPlayerCount(count);
      state.preset = selectedPresetId();
      state.setupNotice = { level: "ok", text: `${count} seats added with a recommended role mix.` };
      pulse("tap");
      scheduleRender();
    }

    function applyCodenames() {
      if (!state.players.length) quickSeats(8);
      const names = CODENAMES.slice();
      shuffle(names);
      state.players = state.players.map((player, index) => ({
        ...player,
        name: names[index] || `Alias ${index + 1}`
      }));
      state.currentName = "";
      state.setupNotice = { level: "ok", text: `${state.players.length} codenames assigned. Rename anyone before dealing.` };
      pulse("tap");
      scheduleRender();
    }

    function shuffleSeats() {
      if (state.players.length < 2) return;
      shuffle(state.players);
      state.setupNotice = { level: "ok", text: "Seat order shuffled before the deal." };
      pulse("tap");
      scheduleRender();
    }

    function recommendRoles() {
      if (state.players.length < 3) {
        state.setupNotice = { level: "warn", text: "Add at least 3 players before role recommendations." };
        scheduleRender();
        return;
      }
      state.config = recommendedConfigForPlayerCount(state.players.length);
      state.preset = selectedPresetId();
      state.setupNotice = { level: "ok", text: `Recommended roles for ${state.players.length} players applied.` };
      pulse("tap");
      scheduleRender();
    }

    function startGame() {
      if (!isValidSetup()) return;
      clearUndo();
      const deck = [];
      for (let i = 0; i < state.config.killers; i++) deck.push("killer");
      for (let i = 0; i < state.config.torturers; i++) deck.push("torturer");
      for (let i = 0; i < state.config.doctors; i++) deck.push("doctor");
      for (let i = 0; i < state.config.detectives; i++) deck.push("detective");
      if (state.config.whore) deck.push("whore");
      if (state.config.joker) deck.push("joker");
      while (deck.length < state.players.length) deck.push("civilian");
      shuffle(deck);
      state.players.forEach((p, i) => {
        p.role = deck[i];
        p.alive = true;
        p.canTalk = true;
        p.canVote = true;
        p.promoted = false;
      });
      state.revealIndex = 0;
      state.cardFlipped = false;
      state.round = 1;
      state.torturerPromoted = false;
      state.events = [];
      state.history = [];
      state.timeline = [];
      state.vote = null;
      state.result = null;
      state.modal = null;
      state.narratorTab = "overview";
      state.narratorTruthUnlocked = false;
      state.dayPromptIndex = randomInt(DAY_PROMPTS.length);
      state.setupNotice = null;
      wantsWakeLock = true;
      acquireWakeLock();
      pulse("tap");
      navigate("reveal", "reveal");
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [items[i], items[j]] = [items[j], items[i]];
      }
    }

    function randomInt(max) {
      if (window.crypto && crypto.getRandomValues) {
        const values = new Uint32Array(1);
        crypto.getRandomValues(values);
        return values[0] % max;
      }
      return Math.floor(Math.random() * max);
    }

    function flipCard() {
      if (state.cardFlipped) return;
      state.cardFlipped = true;
      pulse("flip");
      scheduleRender();
    }

    function nextReveal() {
      state.revealIndex += 1;
      state.cardFlipped = false;
      if (state.revealIndex >= state.players.length) {
        navigate("game", "day");
      } else {
        pulse("tap");
        scheduleRender(true);
      }
    }

    function createVoteState() {
      return {
        voters: alive().filter((p) => p.canVote).map((p) => p.id),
        index: 0,
        ballots: {}
      };
    }

    function startVote() {
      clearUndo();
      state.vote = createVoteState();
      pulse("tap");
      navigate("game", "vote");
    }

    function cancelVote() {
      state.vote = null;
      pulse("tap");
      navigate("game", "day");
    }

    function currentVoter(vote = state.vote) {
      if (!vote || vote.index >= vote.voters.length) return null;
      const voter = byId(vote.voters[vote.index]);
      return voter && voter.alive && voter.canVote ? voter : null;
    }

    function castVote(targetId) {
      const vote = state.vote;
      if (!vote || vote.index >= vote.voters.length) return;
      const voterId = vote.voters[vote.index];
      const target = targetId ? byId(targetId) : null;
      vote.ballots[voterId] = target && target.alive ? target.id : null;
      vote.index += 1;
      pulse(target ? "tap" : "flip");
      scheduleRender(true);
    }

    function voteSummary(vote = state.vote, players = state.players) {
      const rowsById = new Map();
      const voters = vote ? vote.voters.map((id) => byId(id, players)).filter(Boolean) : [];
      if (vote) {
        Object.entries(vote.ballots).forEach(([voterId, targetId]) => {
          if (!targetId) return;
          const voter = byId(voterId, players);
          const target = byId(targetId, players);
          if (!voter || !target || !target.alive) return;
          if (!rowsById.has(target.id)) rowsById.set(target.id, { id: target.id, name: target.name, count: 0, voters: [] });
          const row = rowsById.get(target.id);
          row.count += 1;
          row.voters.push(voter.name);
        });
      }
      const rows = Array.from(rowsById.values()).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
      const highest = rows.length ? rows[0].count : 0;
      const leaders = rows.filter((row) => row.count === highest);
      const tie = leaders.length > 1 && highest > 0;
      return {
        voters,
        rows,
        highest,
        tie,
        winnerId: !tie && highest > 0 ? leaders[0].id : null
      };
    }

    function recordTimeline(kind, title, detail) {
      state.timeline.push({
        round: state.round,
        phase: state.phase,
        kind,
        title,
        detail
      });
    }

    function openFinalWords(id) {
      const player = byId(id);
      if (!player || !player.alive) return;
      state.modal = { type: "finalWords", id };
      pulse("tap");
      scheduleRender();
    }

    function randomTiedEliminate() {
      const summary = voteSummary();
      if (!summary.tie) return;
      const leaders = summary.rows.filter((row) => row.count === summary.highest);
      if (!leaders.length) return;
      const picked = leaders[randomInt(leaders.length)];
      recordTimeline("vote", "Tie broken by random draw", `${leaders.map((row) => row.name).join(", ")} were tied. ${picked.name} was drawn.`);
      openFinalWords(picked.id);
    }

    function startNight() {
      clearUndo();
      state.vote = null;
      state.players.forEach((p) => {
        if (p.alive) {
          p.canTalk = true;
          p.canVote = true;
        }
      });
      state.night.actions = emptyActions();
      state.night.steps = buildNightSteps();
      state.night.index = 0;
      if (!state.night.steps.length) {
        resolveNight();
        return;
      }
      pulse("night");
      vibrate([10, 50, 10]);
      navigate("game", "night");
    }

    function buildNightSteps(players = state.players) {
      const steps = [];
      if (aliveRole("joker", players).length) steps.push("joker");
      if (activeKillerIds(players).length) steps.push("kill");
      if (aliveRole("torturer", players).some((p) => !p.promoted) && !state.torturerPromoted) steps.push("torturer");
      if (aliveRole("whore", players).length) steps.push("whore");
      if (aliveRole("doctor", players).length) steps.push("doctor");
      if (aliveRole("detective", players).length) steps.push("detective");
      return steps;
    }

    function currentStep() {
      return state.night.steps[state.night.index] || null;
    }

    function pickNightTarget(id) {
      const step = currentStep();
      const a = state.night.actions;
      if (step === "joker" && a.jokerAwake) a.jokerSuggestion = a.jokerSuggestion === id ? null : id;
      if (step === "kill") a.killTarget = a.killTarget === id ? null : id;
      if (step === "torturer" && a.tortureMode) a.tortureTarget = a.tortureTarget === id ? null : id;
      if (step === "whore") a.whoreTarget = a.whoreTarget === id ? null : id;
      if (step === "doctor") a.doctorSave = a.doctorSave === id ? null : id;
      if (step === "detective") a.detectiveCheck = a.detectiveCheck === id ? null : id;
      pulse("tap");
      scheduleRender();
    }

    function nextStep() {
      if (!stepCanAdvance()) {
        pulse("tap");
        scheduleRender();
        return;
      }
      state.night.index += 1;
      if (state.night.index >= state.night.steps.length) {
        resolveNight();
      } else {
        pulse("tap");
        scheduleRender(true);
      }
    }

    function skipStep() {
      const step = currentStep();
      const a = state.night.actions;
      if (step === "joker") { a.jokerAwake = false; a.jokerSuggestion = null; }
      if (step === "kill") a.killTarget = null;
      if (step === "torturer") { a.tortureMode = null; a.tortureTarget = null; }
      if (step === "whore") a.whoreTarget = null;
      if (step === "doctor") { a.doctorSave = null; a.doctorActor = null; }
      if (step === "detective") a.detectiveCheck = null;
      nextStep();
    }

    function resolveNight() {
      const outcome = resolveNightCore(state.players, state.night.actions, {
        round: state.round,
        torturerPromoted: state.torturerPromoted
      });
      state.torturerPromoted = outcome.torturerPromoted;
      state.events = outcome.events.length ? outcome.events : [{ kind: "info", icon: "moon", title: "Quiet night", message: "No public result was announced." }];
      state.history.push({ round: state.round, events: state.events.map((e) => ({ ...e })) });
      recordTimeline("night", `Night ${state.round} resolved`, state.events.map((event) => event.title).join(" | "));
      const winner = getWinner(state.players);
      if (winner) {
        finishGame(winner);
        return;
      }
      navigate("game", "dawn");
    }

    function resolveNightCore(players, actions, context) {
      const events = [];
      const killerIds = activeKillerIds(players);
      const whore = players.find((p) => p.alive && p.role === "whore") || null;
      const savedId = actions.doctorSave || null;
      const whoreTargetId = actions.whoreTarget || null;
      const killTargetId = actions.killTarget || null;
      const sleptWithActiveKiller = Boolean(whore && whoreTargetId && killerIds.includes(whoreTargetId));

      if (killTargetId && sleptWithActiveKiller) {
        events.push({ kind: "info", icon: "heart", title: "No kill tonight", message: "The Whore slept with an active Killer. The Mafia kill fails." });
      } else if (killTargetId) {
        const target = byId(killTargetId, players);
        const whoreIsTarget = Boolean(whore && killTargetId === whore.id);
        const partnerIsTarget = Boolean(whore && whoreTargetId && killTargetId === whoreTargetId && !whoreIsTarget);

        if (whoreIsTarget) {
          if (savedId === whore.id) {
            events.push({ kind: "save", icon: "shield", title: `${whore.name} was saved`, message: "Doctor saved the Whore. Her partner also lives." });
          } else {
            killPlayer(whore.id, players);
            events.push({ kind: "death", icon: "skull", title: `${whore.name} died`, message: "Eliminated by the Mafia" });
            const partner = whoreTargetId ? byId(whoreTargetId, players) : null;
            if (partner && partner.alive) {
              if (savedId === partner.id) {
                events.push({ kind: "save", icon: "shield", title: `${partner.name} was saved`, message: "Doctor saved the Whore's partner." });
              } else {
                killPlayer(partner.id, players);
                events.push({ kind: "death", icon: "skull", title: `${partner.name} died`, message: "Shares the fate of the Whore" });
              }
            }
          }
        } else if (partnerIsTarget) {
          const partner = target;
          if (partner && savedId === partner.id) {
            events.push({ kind: "save", icon: "shield", title: `${partner.name} was saved`, message: "Doctor saved the Whore's partner. The Whore also lives." });
          } else {
            if (partner) {
              killPlayer(partner.id, players);
              events.push({ kind: "death", icon: "skull", title: `${partner.name} died`, message: "Eliminated by the Mafia" });
            }
            if (whore && whore.alive) {
              if (savedId === whore.id) {
                events.push({ kind: "save", icon: "shield", title: `${whore.name} was saved`, message: "Doctor saved the Whore from sharing her partner's fate." });
              } else {
                killPlayer(whore.id, players);
                events.push({ kind: "death", icon: "skull", title: `${whore.name} died`, message: "The Whore shares the fate of her partner" });
              }
            }
          }
        } else if (target) {
          if (savedId === target.id) {
            events.push({ kind: "save", icon: "shield", title: `${target.name} was saved`, message: "Doctor protected the Mafia target." });
          } else {
            killPlayer(target.id, players);
            events.push({ kind: "death", icon: "skull", title: `${target.name} died`, message: "Eliminated by the Mafia" });
          }
        }
      } else {
        events.push({ kind: "info", icon: "moon", title: "No kill", message: "The Mafia did not choose a victim." });
      }

      if (actions.tortureTarget && actions.tortureMode && !context.torturerPromoted) {
        const target = byId(actions.tortureTarget, players);
        if (target && target.alive) {
          if (actions.tortureMode === "mouth") {
            target.canTalk = false;
            events.push({ kind: "torture", icon: "mouth", title: `${target.name} is silenced`, message: `${target.name} cannot speak during the next day.` });
          } else {
            target.canVote = false;
            events.push({ kind: "torture", icon: "hand", title: `${target.name} is restrained`, message: `${target.name} cannot vote during the next day.` });
          }
        }
      }

      if (actions.detectiveCheck) {
        const target = byId(actions.detectiveCheck, players);
        if (target) {
          const mafia = target.role === "killer" || target.role === "torturer";
          events.push({ kind: mafia ? "death" : "info", icon: mafia ? "thumbDown" : "thumbUp", title: `${target.name}: ${mafia ? "MAFIA" : "NOT MAFIA"}`, message: mafia ? "Show thumbs down to the Detective." : "Show thumbs up to the Detective." });
        }
      }

      const promotion = applyPromotion(players, context.torturerPromoted);
      if (promotion.promoted.length) {
        events.push({ kind: "info", icon: "crown", title: "Succession", message: `${promotion.promoted.map((p) => p.name).join(", ")} becomes the active Killer.` });
      }

      return { events, torturerPromoted: promotion.torturerPromoted };
    }

    function killPlayer(id, players = state.players) {
      const player = byId(id, players);
      if (player) player.alive = false;
    }

    function applyPromotion(players = state.players, alreadyPromoted = state.torturerPromoted) {
      if (alreadyPromoted) return { promoted: [], torturerPromoted: true };
      const livingKillers = players.filter((p) => p.alive && p.role === "killer");
      const torturers = players.filter((p) => p.alive && p.role === "torturer" && !p.promoted);
      if (livingKillers.length === 0 && torturers.length > 0) {
        torturers.forEach((p) => { p.promoted = true; });
        return { promoted: torturers, torturerPromoted: true };
      }
      return { promoted: [], torturerPromoted: alreadyPromoted };
    }

    function getWinner(players = state.players) {
      const counts = liveCounts(players);
      if (counts.mafia === 0) return "town";
      if (counts.mafia >= counts.town) return "mafia";
      return null;
    }

    function finishGame(result, options = {}) {
      state.result = result;
      if (!options.preserveUndo) clearUndo();
      wantsWakeLock = false;
      releaseWakeLock();
      pulse(result === "town" ? "townWin" : "mafiaWin");
      navigate("gameover", "over");
    }

    function beginDay() {
      state.round += 1;
      state.dayPromptIndex = (state.dayPromptIndex + 1) % DAY_PROMPTS.length;
      navigate("game", "day");
    }

    function openEliminate(id) {
      const player = byId(id);
      if (!player || !player.alive) return;
      state.modal = { type: "eliminate", id };
      pulse("tap");
      scheduleRender();
    }

    function confirmEliminate(id) {
      const player = byId(id);
      if (!player || !player.alive) return;
      const beforePromoted = state.torturerPromoted;
      player.alive = false;
      const promotion = applyPromotion(state.players, state.torturerPromoted);
      state.torturerPromoted = promotion.torturerPromoted;
      const summary = voteSummary();
      if (summary.rows.length) {
        recordTimeline("vote", `${player.name} was voted out`, summary.rows.map((row) => `${row.name}: ${row.count}`).join(", "));
      }
      recordTimeline("elimination", `${player.name} eliminated`, `${ROLE[player.role].label} entered the boneyard.`);
      state.undo = {
        playerId: player.id,
        role: player.role,
        promotedIds: promotion.promoted.map((p) => p.id),
        torturerPromotedBefore: beforePromoted
      };
      state.vote = null;
      state.modal = null;
      startUndoTimer();
      vibrate(15);
      pulse("kill");
      const winner = getWinner();
      if (winner) {
        finishGame(winner, { preserveUndo: true });
        return;
      }
      navigate("game", "day");
    }

    function undoEliminate() {
      if (!state.undo) return;
      const undo = state.undo;
      const player = byId(undo.playerId);
      if (player) player.alive = true;
      if (undo.role === "killer" && undo.promotedIds.length) {
        undo.promotedIds.forEach((id) => {
          const promoted = byId(id);
          if (promoted) promoted.promoted = false;
        });
        state.torturerPromoted = undo.torturerPromotedBefore;
      }
      clearUndo();
      state.result = null;
      wantsWakeLock = true;
      acquireWakeLock();
      pulse("tap");
      navigate("game", "day");
    }

    function startUndoTimer() {
      window.clearTimeout(undoTimer);
      undoTimer = window.setTimeout(() => {
        state.undo = null;
        scheduleRender();
      }, 5000);
    }

    function clearUndo() {
      window.clearTimeout(undoTimer);
      undoTimer = 0;
      state.undo = null;
    }

    function getDoctorActor() {
      const doctors = aliveRole("doctor");
      if (!doctors.length) return null;
      const selected = state.night.actions.doctorActor ? byId(state.night.actions.doctorActor) : null;
      if (selected && selected.alive && selected.role === "doctor") return selected;
      state.night.actions.doctorActor = doctors[0].id;
      return doctors[0];
    }

    function doctorTargets(actorId, players = state.players, round = state.round) {
      return alive(players).filter((p) => !(round === 1 && actorId && p.id === actorId));
    }

    function torturerTargets(players = state.players) {
      return alive(players);
    }

    function resetGame() {
      clearUndo();
      const preservedPlayers = state.players.map((p) => ({
        id: uid(),
        name: p.name,
        role: null,
        alive: true,
        canTalk: true,
        canVote: true,
        promoted: false
      }));
      state.players = preservedPlayers;
      state.revealIndex = 0;
      state.cardFlipped = false;
      state.round = 1;
      state.phase = "setup";
      state.torturerPromoted = false;
      state.night = { steps: [], index: 0, actions: emptyActions() };
      state.vote = null;
      state.events = [];
      state.history = [];
      state.timeline = [];
      state.result = null;
      state.modal = null;
      state.narratorTab = "overview";
      state.narratorTruthUnlocked = false;
      state.dayPromptIndex = 0;
      state.setupNotice = { level: "ok", text: "New game ready. Deal again when the table is set." };
      state.restoredAt = null;
      wantsWakeLock = false;
      releaseWakeLock();
      navigate("setup", "setup");
    }

    function clearSavedGame() {
      try { window.localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      const settings = { ...state.settings };
      state.screen = "setup";
      state.phase = "setup";
      state.players = [];
      state.config = { ...DEFAULT_CONFIG };
      state.preset = "classic";
      state.currentName = "";
      state.revealIndex = 0;
      state.cardFlipped = false;
      state.round = 1;
      state.torturerPromoted = false;
      state.night = { steps: [], index: 0, actions: emptyActions() };
      state.vote = null;
      state.events = [];
      state.history = [];
      state.timeline = [];
      state.result = null;
      state.undo = null;
      state.narratorTab = "overview";
      state.narratorTruthUnlocked = false;
      state.dayPromptIndex = 0;
      state.settings = settings;
      state.setupNotice = { level: "ok", text: "Saved game cleared from this device." };
      state.modal = null;
      wantsWakeLock = false;
      releaseWakeLock();
      pulse("tap");
      navigate("setup", "setup");
    }

    function remixRoles() {
      clearUndo();
      state.players = state.players.map((p) => ({
        id: uid(),
        name: p.name,
        role: null,
        alive: true,
        canTalk: true,
        canVote: true,
        promoted: false
      }));
      if (isValidSetup()) {
        startGame();
      } else {
        state.setupNotice = { level: "warn", text: "Table restored, but setup needs adjustment before remixing." };
        navigate("setup", "setup");
      }
    }

    function clonePlayers(list) {
      return list.map((p) => ({ ...p }));
    }

    function queuePersist() {
      if (persistQueued) return;
      persistQueued = true;
      window.setTimeout(() => {
        persistQueued = false;
        persistState();
      }, 0);
    }

    function persistState() {
      try {
        if (!window.localStorage) return;
        const safeState = {
          screen: state.screen,
          phase: state.phase,
          players: clonePlayers(state.players),
          config: { ...state.config },
          preset: selectedPresetId(),
          currentName: state.screen === "setup" ? state.currentName : "",
          revealIndex: state.revealIndex,
          cardFlipped: false,
          round: state.round,
          torturerPromoted: state.torturerPromoted,
          night: {
            steps: state.night.steps.slice(),
            index: state.night.index,
            actions: { ...state.night.actions }
          },
          vote: state.vote ? {
            voters: state.vote.voters.slice(),
            index: state.vote.index,
            ballots: { ...state.vote.ballots }
          } : null,
          events: state.events.map((event) => ({ ...event })),
          history: state.history.map((round) => ({ round: round.round, events: round.events.map((event) => ({ ...event })) })),
          timeline: state.timeline.map((item) => ({ ...item })),
          result: state.result,
          narratorTab: state.narratorTab,
          narratorTruthUnlocked: false,
          dayPromptIndex: state.dayPromptIndex,
          settings: { ...state.settings },
          transitionKey: state.transitionKey
        };
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: SAVE_VERSION, savedAt: Date.now(), state: safeState }));
      } catch (_) {}
    }

    function restoreState() {
      try {
        if (!window.localStorage) return false;
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== SAVE_VERSION || !parsed.state) return false;
        const restored = sanitizeSavedState(parsed.state);
        if (!restored) return false;
        Object.assign(state, restored);
        state.restoredAt = parsed.savedAt || Date.now();
        state.cardFlipped = false;
        state.modal = null;
        state.undo = null;
        state.setupNotice = restored.screen === "setup" && restored.players.length ? { level: "ok", text: "Saved table restored." } : null;
        wantsWakeLock = state.screen !== "setup" && state.screen !== "gameover";
        return true;
      } catch (_) {
        try { window.localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        return false;
      }
    }

    function sanitizeSavedState(saved) {
      if (!saved || !Array.isArray(saved.players)) return null;
      const players = saved.players
        .map((player) => ({
          id: typeof player.id === "string" && player.id ? player.id : uid(),
          name: normalizeName(player.name).slice(0, 22) || "Player",
          role: ROLE[player.role] ? player.role : null,
          alive: player.alive !== false,
          canTalk: player.canTalk !== false,
          canVote: player.canVote !== false,
          promoted: Boolean(player.promoted)
        }))
        .slice(0, 24);
      const config = sanitizeConfig(saved.config);
      let phase = ["setup", "reveal", "day", "vote", "night", "dawn", "over"].includes(saved.phase) ? saved.phase : "setup";
      let screen = ["setup", "reveal", "game", "gameover"].includes(saved.screen) ? saved.screen : "setup";
      let revealIndex = Math.max(0, Math.min(Number(saved.revealIndex) || 0, Math.max(players.length - 1, 0)));
      const hasDealtRoles = players.length > 0 && players.every((player) => ROLE[player.role]);
      if (screen !== "setup" && !hasDealtRoles) {
        screen = "setup";
        phase = "setup";
        revealIndex = 0;
      }
      const vote = saved.vote && Array.isArray(saved.vote.voters)
        ? { voters: saved.vote.voters.filter((id) => players.some((p) => p.id === id)), index: Math.max(0, Number(saved.vote.index) || 0), ballots: saved.vote.ballots && typeof saved.vote.ballots === "object" ? { ...saved.vote.ballots } : {} }
        : null;
      return {
        screen,
        phase,
        players,
        config,
        preset: selectedPresetId(config),
        setupNotice: null,
        currentName: screen === "setup" ? normalizeName(saved.currentName) : "",
        revealIndex,
        cardFlipped: false,
        round: Math.max(1, Number(saved.round) || 1),
        torturerPromoted: Boolean(saved.torturerPromoted),
        night: saved.night && Array.isArray(saved.night.steps) ? { steps: saved.night.steps.filter((step) => STEP_META[step]), index: Math.max(0, Number(saved.night.index) || 0), actions: { ...emptyActions(), ...(saved.night.actions || {}) } } : { steps: [], index: 0, actions: emptyActions() },
        vote,
        events: Array.isArray(saved.events) ? saved.events.map(sanitizeEvent).filter(Boolean) : [],
        history: Array.isArray(saved.history) ? saved.history.map(sanitizeHistoryRound).filter(Boolean) : [],
        timeline: Array.isArray(saved.timeline) ? saved.timeline.map(sanitizeTimelineItem).filter(Boolean) : [],
        result: saved.result === "town" || saved.result === "mafia" ? saved.result : null,
        modal: null,
        narratorTab: ["overview", "roles", "log"].includes(saved.narratorTab) ? saved.narratorTab : "overview",
        narratorTruthUnlocked: false,
        dayPromptIndex: Math.max(0, Math.min(DAY_PROMPTS.length - 1, Number(saved.dayPromptIndex) || 0)),
        settings: sanitizeSettings(saved.settings),
        undo: null,
        restoredAt: null,
        transitionKey: typeof saved.transitionKey === "string" ? saved.transitionKey : `${screen}:${phase}`
      };
    }

    function sanitizeConfig(config) {
      const source = config && typeof config === "object" ? config : DEFAULT_CONFIG;
      return {
        killers: Math.max(1, Math.min(10, Number(source.killers) || DEFAULT_CONFIG.killers)),
        torturers: Math.max(0, Math.min(8, Number(source.torturers) || 0)),
        doctors: Math.max(0, Math.min(6, Number(source.doctors) || 0)),
        detectives: Math.max(0, Math.min(6, Number(source.detectives) || 0)),
        whore: Boolean(source.whore),
        joker: Boolean(source.joker)
      };
    }

    function sanitizeEvent(event) {
      if (!event || typeof event !== "object") return null;
      return {
        kind: ["death", "save", "info", "torture"].includes(event.kind) ? event.kind : "info",
        icon: ICON[event.icon] ? event.icon : "info",
        title: normalizeName(event.title) || "Event",
        message: normalizeName(event.message)
      };
    }

    function sanitizeHistoryRound(round) {
      if (!round || !Array.isArray(round.events)) return null;
      return {
        round: Math.max(1, Number(round.round) || 1),
        events: round.events.map(sanitizeEvent).filter(Boolean)
      };
    }

    function sanitizeTimelineItem(item) {
      if (!item || typeof item !== "object") return null;
      return {
        round: Math.max(1, Number(item.round) || 1),
        phase: normalizeName(item.phase) || "game",
        kind: normalizeName(item.kind) || "event",
        title: normalizeName(item.title) || "Event",
        detail: normalizeName(item.detail)
      };
    }

    function sanitizeSettings(settings) {
      const source = settings && typeof settings === "object" ? settings : {};
      return {
        silent: Boolean(source.silent),
        lowBlur: Boolean(source.lowBlur),
        motion: source.motion === "subtle" ? "subtle" : "cinematic"
      };
    }

    async function ensureAudio() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!audioCtx) audioCtx = new Ctx();
      if (audioCtx.state === "suspended") await audioCtx.resume();
      return audioCtx;
    }

    async function tone(freqA, freqB, duration, type, gainValue) {
      if (state.settings.silent) return;
      const ctx = await ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freqA, ctx.currentTime);
      if (freqB) osc.frequency.exponentialRampToValueAtTime(freqB, ctx.currentTime + duration);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(gainValue || 0.08, ctx.currentTime + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration + 0.02);
    }

    function chord(notes, duration, type, gain) {
      notes.forEach((note, i) => window.setTimeout(() => { tone(note[0], note[1], duration, type, gain); }, i * 80));
    }

    function pulse(kind) {
      if (state.settings.silent) return;
      vibrate(8);
      if (kind === "flip") { tone(700, 180, .09, "sine", .09); return; }
      if (kind === "night") { chord([[392, 330], [330, 262], [262, 196]], .62, "sine", .055); return; }
      if (kind === "kill") { chord([[110, 82], [147, 110], [185, 130]], .55, "sawtooth", .045); return; }
      if (kind === "townWin") { chord([[262, 330], [330, 392], [392, 523], [523, 659]], .34, "sine", .06); return; }
      if (kind === "mafiaWin") { chord([[220, 165], [185, 130], [147, 98]], .55, "sawtooth", .05); return; }
      tone(440, 660, .05, "sine", .045);
    }

    function vibrate(pattern) {
      if (state.settings.silent) return;
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    async function acquireWakeLock() {
      if (!("wakeLock" in navigator) || !wantsWakeLock || document.visibilityState !== "visible") return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
          if (wantsWakeLock && document.visibilityState === "visible") window.setTimeout(acquireWakeLock, 250);
        }, { once: true });
      } catch (_) {
        wakeLock = null;
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        const lock = wakeLock;
        wakeLock = null;
        lock.release().catch(() => {});
      }
    }

    function createStars() {
      const root = document.getElementById("stars");
      const stars = [];
      for (let i = 0; i < 130; i++) {
        const x = Math.round(Math.random() * 10000) / 100;
        const y = Math.round(Math.random() * 10000) / 100;
        const size = Math.round((Math.random() * 1.7 + .8) * 10) / 10;
        const duration = Math.round((Math.random() * 2600 + 1600));
        stars.push(`<span class="star" style="--x:${x}%;--y:${y}%;--s:${size}px;--d:${duration}ms"></span>`);
      }
      root.innerHTML = stars.join("");
    }

    function handleClick(event) {
      const actionable = event.target.closest("[data-action]");
      if (!actionable) return;
      const action = actionable.dataset.action;
      if (action === "modal-backdrop" && event.target !== actionable) return;
      if (action === "add-player") addPlayer();
      if (action === "remove-player") { state.players = state.players.filter((p) => p.id !== actionable.dataset.id); state.setupNotice = null; pulse("tap"); scheduleRender(); }
      if (action === "quick-seats") quickSeats(8);
      if (action === "codenames") applyCodenames();
      if (action === "shuffle-seats") shuffleSeats();
      if (action === "recommend-roles") recommendRoles();
      if (action === "open-settings") { state.modal = { type: "settings" }; pulse("tap"); scheduleRender(); }
      if (action === "toggle-setting") { state.settings[actionable.dataset.key] = !state.settings[actionable.dataset.key]; pulse("tap"); scheduleRender(); }
      if (action === "cycle-motion") { state.settings.motion = state.settings.motion === "subtle" ? "cinematic" : "subtle"; pulse("tap"); scheduleRender(); }
      if (action === "clear-save") clearSavedGame();
      if (action === "next-prompt") { state.dayPromptIndex = (state.dayPromptIndex + 1) % DAY_PROMPTS.length; pulse("tap"); scheduleRender(); }
      if (action === "apply-preset") applyPreset(actionable.dataset.preset);
      if (action === "config-step") setConfigStep(actionable.dataset.key, Number(actionable.dataset.delta));
      if (action === "config-toggle") { state.config[actionable.dataset.key] = !state.config[actionable.dataset.key]; state.preset = selectedPresetId(); state.setupNotice = null; pulse("tap"); scheduleRender(); }
      if (action === "start-game") startGame();
      if (action === "flip-card") flipCard();
      if (action === "next-reveal") nextReveal();
      if (action === "start-vote") startVote();
      if (action === "cast-vote") castVote(actionable.dataset.id || null);
      if (action === "restart-vote") startVote();
      if (action === "cancel-vote") cancelVote();
      if (action === "random-tied") randomTiedEliminate();
      if (action === "open-final-words") openFinalWords(actionable.dataset.id);
      if (action === "open-eliminate") openEliminate(actionable.dataset.id);
      if (action === "confirm-eliminate") confirmEliminate(actionable.dataset.id);
      if (action === "undo-eliminate") undoEliminate();
      if (action === "skip-vote" || action === "start-night") startNight();
      if (action === "open-narrator") { state.modal = { type: "narrator" }; state.narratorTab = "overview"; state.narratorTruthUnlocked = false; pulse("tap"); scheduleRender(); }
      if (action === "close-modal" || action === "modal-backdrop") { state.modal = null; state.narratorTruthUnlocked = false; pulse("tap"); scheduleRender(); }
      if (action === "narrator-tab") { state.narratorTab = actionable.dataset.tab; if (state.narratorTab !== "roles") state.narratorTruthUnlocked = false; pulse("tap"); scheduleRender(); }
      if (action === "toggle-talk") { const p = byId(actionable.dataset.id); if (p) p.canTalk = !p.canTalk; pulse("tap"); scheduleRender(); }
      if (action === "toggle-vote") { const p = byId(actionable.dataset.id); if (p) p.canVote = !p.canVote; pulse("tap"); scheduleRender(); }
      if (action === "night-pick") pickNightTarget(actionable.dataset.id);
      if (action === "toggle-joker") { state.night.actions.jokerAwake = actionable.dataset.mode === "awake"; if (!state.night.actions.jokerAwake) state.night.actions.jokerSuggestion = null; pulse("tap"); scheduleRender(); }
      if (action === "torture-mode") { state.night.actions.tortureMode = state.night.actions.tortureMode === actionable.dataset.mode ? null : actionable.dataset.mode; state.night.actions.tortureTarget = null; pulse("tap"); scheduleRender(); }
      if (action === "doctor-actor") { state.night.actions.doctorActor = actionable.dataset.id; state.night.actions.doctorSave = null; pulse("tap"); scheduleRender(); }
      if (action === "next-step") nextStep();
      if (action === "skip-step") skipStep();
      if (action === "begin-day") beginDay();
      if (action === "new-game") { state.modal = { type: "reset" }; pulse("tap"); scheduleRender(); }
      if (action === "confirm-reset") resetGame();
      if (action === "remix-roles") remixRoles();
    }

    function handleInput(event) {
      if (event.target && event.target.id === "player-name-field") {
        state.currentName = event.target.value;
        if (state.setupNotice) state.setupNotice = null;
        queuePersist();
      }
    }

    function handleKey(event) {
      if (event.key === "Enter" && event.target && event.target.id === "player-name-field") addPlayer();
      if (event.key === "Escape" && state.modal) { state.modal = null; scheduleRender(); }
    }

    function handlePointerDown(event) {
      const truthButton = event.target.closest('[data-action="hold-truth"]');
      if (truthButton) {
        window.clearTimeout(holdTimer);
        holdTimer = window.setTimeout(() => {
          state.narratorTruthUnlocked = true;
          pulse("tap");
          scheduleRender();
        }, 900);
        return;
      }
      const sheet = event.target.closest("[data-sheet]");
      if (!sheet) return;
      dragSheet = { sheet, startY: event.clientY, currentY: 0, pointerId: event.pointerId };
      sheet.setPointerCapture(event.pointerId);
    }

    function handlePointerMove(event) {
      if (!dragSheet || dragSheet.pointerId !== event.pointerId) return;
      const delta = Math.max(0, event.clientY - dragSheet.startY);
      dragSheet.currentY = delta;
      if (!dragRaf) {
        dragRaf = requestAnimationFrame(() => {
          dragRaf = 0;
          if (dragSheet) dragSheet.sheet.style.transform = `translate3d(0, ${dragSheet.currentY}px, 0)`;
        });
      }
    }

    function handlePointerUp(event) {
      window.clearTimeout(holdTimer);
      holdTimer = 0;
      if (!dragSheet || dragSheet.pointerId !== event.pointerId) return;
      const shouldClose = dragSheet.currentY > 90;
      dragSheet.sheet.style.transform = "";
      dragSheet = null;
      if (shouldClose) {
        state.modal = null;
        scheduleRender();
      }
    }

    function handlePointerCancel() {
      window.clearTimeout(holdTimer);
      holdTimer = 0;
      if (dragSheet && dragSheet.sheet) dragSheet.sheet.style.transform = "";
      dragSheet = null;
    }

    function runLogicTests() {
      const make = (role, name) => ({ id: uid(), name: name || role, role, alive: true, canTalk: true, canVote: true, promoted: false });
      const assert = (ok, label) => { if (!ok) throw new Error(label); };

      let players = [make("killer", "K"), make("whore", "W"), make("doctor", "D"), make("civilian", "C")];
      let out = resolveNightCore(clonePlayers(players), { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[0].id, doctorSave: players[3].id }, { round: 1, torturerPromoted: false });
      assert(out.events.some((e) => e.title === "No kill tonight"), "Whore with active Killer blocks kill");

      players = [make("killer", "K"), make("whore", "W"), make("doctor", "D"), make("civilian", "P")];
      let sim = clonePlayers(players);
      resolveNightCore(sim, { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[3].id, doctorSave: players[3].id }, { round: 2, torturerPromoted: false });
      assert(sim.every((p) => p.alive), "Doctor saving partner keeps partner and Whore alive");

      sim = clonePlayers(players);
      resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id, doctorSave: players[1].id }, { round: 2, torturerPromoted: false });
      assert(sim.every((p) => p.alive), "Doctor saving Whore keeps Whore and partner alive");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id, doctorSave: players[3].id }, { round: 2, torturerPromoted: false });
      assert(!sim.find((p) => p.name === "W").alive && sim.find((p) => p.name === "P").alive, "Partner saved when Whore dies");
      assert(out.events.some((e) => e.message === "Eliminated by the Mafia"), "Mafia death message exact");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[3].id, whoreTarget: players[3].id }, { round: 2, torturerPromoted: false });
      assert(!sim.find((p) => p.name === "W").alive && !sim.find((p) => p.name === "P").alive, "Partner death pulls Whore");
      assert(out.events.some((e) => e.message === "The Whore shares the fate of her partner"), "Whore fate message exact");

      sim = clonePlayers(players);
      out = resolveNightCore(sim, { ...emptyActions(), killTarget: players[1].id, whoreTarget: players[3].id }, { round: 2, torturerPromoted: false });
      assert(out.events.some((e) => e.message === "Shares the fate of the Whore"), "Partner fate message exact");

      const docA = make("doctor", "A");
      const docB = make("doctor", "B");
      const civ = make("civilian", "C");
      assert(doctorTargets(docA.id, [docA, docB, civ], 1).some((p) => p.id === docB.id), "Doctor A can save Doctor B in round 1");
      assert(!doctorTargets(docA.id, [docA, docB, civ], 1).some((p) => p.id === docA.id), "Doctor A cannot self-save in round 1");

      players = [make("killer", "K"), make("torturer", "T"), make("civilian", "C")];
      players[0].alive = false;
      const promo = applyPromotion(players, false);
      assert(promo.promoted.length === 1 && players[1].promoted, "Torturer promotion triggers when last Killer dies");
      assert(torturerTargets(players).some((p) => p.role === "torturer"), "Torturer can target self");
      assert(getWinner([make("killer", "K"), make("civilian", "C")]) === "mafia", "Mafia parity win");
      assert(getWinner([make("civilian", "C")]) === "town", "Town wins when Mafia gone");

      players = [make("killer", "Alex"), make("doctor", "alex"), make("civilian", "Mara")];
      assert(validation({ ...DEFAULT_CONFIG, detectives: 0 }, players).text === "Player names must be unique.", "Duplicate names are rejected");
      assert(recommendedConfigForPlayerCount(8).killers === 2, "Eight-player recommendation adds second Killer");
      assert(setupRiskProfile({ killers: 2, torturers: 1, doctors: 0, detectives: 0, whore: false, joker: false }, [make("killer"), make("killer"), make("torturer"), make("civilian"), make("civilian")]).level === "err", "Risk profile surfaces invalid pressure");
      assert(dashboardSummary().objective.length > 0 && dashboardSummary().next.length > 0, "Dashboard summary always has guidance");
      assert(discussionPrompt().length > 20, "Discussion prompt provides usable table pressure");

      players = [make("killer", "K"), make("civilian", "A"), make("civilian", "B")];
      let vote = { voters: [players[0].id, players[1].id, players[2].id], index: 3, ballots: { [players[0].id]: players[1].id, [players[1].id]: players[2].id, [players[2].id]: players[1].id } };
      assert(voteSummary(vote, players).winnerId === players[1].id, "Vote winner resolves by highest tally");
      vote = { voters: [players[0].id, players[1].id], index: 2, ballots: { [players[0].id]: players[1].id, [players[1].id]: players[0].id } };
      assert(voteSummary(vote, players).tie, "Voting tie blocks automatic elimination");
      assert(!stepCanAdvance("kill", emptyActions()), "Kill step requires a target unless skipped");
      assert(stepCanAdvance("kill", { ...emptyActions(), killTarget: players[1].id }), "Kill step advances after target");

      const restored = sanitizeSavedState({ screen: "reveal", phase: "reveal", players, config: DEFAULT_CONFIG, revealIndex: 999, cardFlipped: true });
      assert(restored && restored.revealIndex === 2 && restored.cardFlipped === false, "Saved reveal state hides card after refresh");
      return true;
    }

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
    document.addEventListener("keydown", handleKey);
    document.addEventListener("touchstart", () => {}, { passive: true });
    document.addEventListener("touchmove", () => {}, { passive: true });
    document.addEventListener("pointerdown", handlePointerDown);
    document.addEventListener("pointermove", handlePointerMove);
    document.addEventListener("pointerup", handlePointerUp);
    document.addEventListener("pointercancel", handlePointerCancel);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && wantsWakeLock) acquireWakeLock();
    });

    window.MAFIA_DEV = {
      state,
      runLogicTests,
      resolveNightCore,
      getWinner,
      doctorTargets,
      torturerTargets,
      validation,
      voteSummary,
      createVoteState,
      sanitizeSavedState,
      recommendedConfigForPlayerCount,
      setupRiskProfile,
      dashboardSummary,
      discussionPrompt,
      stepCanAdvance
    };

    if (restoreState() && wantsWakeLock) acquireWakeLock();
    createStars();
    resetScrollNext = true;
    render();
    queuePersist();
  </script>
</body>
</html>
